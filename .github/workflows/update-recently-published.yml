name: Update Recently Published

# Runs whenever an article HTML file is pushed to master.
# Regenerates assets/recently-published.json from git history
# (the 4 most recently *added* articles, newest first).

on:
  push:
    branches: [master]
    paths:
      - 'arts/**/*.html'
      - 'atlas/**/*.html'
      - 'civilization/**/*.html'
      - 'faith/**/*.html'
      - 'hizmet/**/*.html'
      - 'learning/**/*.html'
      - 'life/**/*.html'
      - 'spirit/**/*.html'
      - 'tech/**/*.html'

jobs:
  update-recent:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push the updated JSON back

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full log required to determine addition order

      - name: Generate recently-published.json
        run: python3 .github/scripts/update_recent.py

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/recently-published.json
          if git diff --cached --quiet; then
            echo "recently-published.json is already up to date — nothing to commit."
          else
            git commit -m "chore: update recently-published.json [skip ci]"
            git push origin master
          fi
