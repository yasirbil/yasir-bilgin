name: Verify search-index.json

# Runs on push to confirm search-index.json is up to date.
# The index is generated locally before every commit via:
#   python3 .github/scripts/update_index.py
# This workflow just validates the committed file matches what the script produces.

on:
  push:
    branches: [master]
    paths:
      - 'arts/**/*.html'
      - 'atlas/**/*.html'
      - 'civilization/**/*.html'
      - 'faith/**/*.html'
      - 'hizmet/**/*.html'
      - 'learning/**/*.html'
      - 'life/**/*.html'
      - 'spirit/**/*.html'
      - 'tech/**/*.html'
      - 'assets/search-index.json'
      - '.github/scripts/update_index.py'

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Regenerate and check for drift
        run: |
          cp assets/search-index.json assets/search-index.committed.json
          python3 .github/scripts/update_index.py
          if ! diff -q assets/search-index.json assets/search-index.committed.json > /dev/null; then
            echo "⚠️  search-index.json is out of date."
            echo "Run: python3 .github/scripts/update_index.py && git add assets/search-index.json"
            exit 1
          fi
          echo "✓ search-index.json is up to date."
