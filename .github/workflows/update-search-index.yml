name: Regenerate search-index.json

on:
  push:
    branches: [master]
    paths:
      - 'arts/**/*.html'
      - 'atlas/**/*.html'
      - 'civilization/**/*.html'
      - 'faith/**/*.html'
      - 'hizmet/**/*.html'
      - 'learning/**/*.html'
      - 'life/**/*.html'
      - 'spirit/**/*.html'
      - 'tech/**/*.html'

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Regenerate search-index.json
        run: |
          python3 - << 'EOF'
          import os, json, re
          from pathlib import Path

          SECTION_NAMES = {
            'arts': 'Arts', 'atlas': 'Atlas', 'civilization': 'Civilization',
            'faith': 'Faith', 'hizmet': 'Hizmet', 'learning': 'Learning',
            'life': 'Life', 'spirit': 'Spirit', 'tech': 'Tech',
          }

          def folder_to_name(folder):
            return folder.replace('-and-', ' & ').replace('-', ' ')

          def extract_meta(html, url):
            title_m = re.search(r'<title[^>]*>([^<]+)</title>', html, re.I)
            title = title_m.group(1).strip() if title_m else ''
            title = re.sub(r'\s*\|\s*Yasir Bilgin\s*$', '', title).strip()

            desc_m = re.search(r'<meta[^>]+name=["\']description["\'][^>]+content=["\']([^"\']+)', html, re.I)
            if not desc_m:
              desc_m = re.search(r'<meta[^>]+content=["\']([^"\']+)["\'][^>]+name=["\']description["\']', html, re.I)
            desc = desc_m.group(1).strip() if desc_m else ''

            body = re.sub(r'<script[^>]*>.*?</script>', ' ', html, flags=re.S|re.I)
            body = re.sub(r'<style[^>]*>.*?</style>', ' ', body, flags=re.S|re.I)
            body = re.sub(r'<[^>]+>', ' ', body)
            body = re.sub(r'\s+', ' ', body).strip()[:8000]

            headings = ' '.join(re.findall(r'<h[23][^>]*>([^<]+)</h[23]>', html, re.I))
            return title, desc, headings, body

          entries = []
          root = Path('.')
          for section_dir in sorted(root.iterdir()):
            if not section_dir.is_dir() or section_dir.name not in SECTION_NAMES:
              continue
            section_name = SECTION_NAMES[section_dir.name]
            for subsec_dir in sorted(section_dir.iterdir()):
              if not subsec_dir.is_dir():
                continue
              subsec_name = folder_to_name(subsec_dir.name)
              for html_file in sorted(subsec_dir.rglob('*.html')):
                if html_file.name == 'index.html':
                  continue
                rel = html_file.relative_to(root)
                url = 'https://yasirbilgin.com/' + str(rel).replace('\\','/')
                html = html_file.read_text(errors='ignore')
                title, desc, headings, body = extract_meta(html, url)
                if not title:
                  continue
                entries.append({
                  'url': url, 'path': str(rel),
                  'section': section_name, 'subsec': subsec_name,
                  'title': title, 'desc': desc,
                  'headings': headings, 'body': body,
                })

          Path('assets/search-index.json').write_text(
            json.dumps(entries, ensure_ascii=False, indent=2)
          )
          print(f'Written {len(entries)} entries')
          EOF

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/search-index.json
          git diff --cached --quiet || git commit -m "chore(search): regenerate search-index.json [skip ci]"
          git push origin master
