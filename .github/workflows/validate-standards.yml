name: Validate Site Standards

# Catches missing meta tags, broken head structure, and missing landmarks
# before anything reaches the live site.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run site standards validator
        run: python3 .github/scripts/validate_site_standards.py
