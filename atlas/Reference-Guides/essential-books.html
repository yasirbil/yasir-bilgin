wer","Description":"Racist propaganda disseminated by both Japanese and American mass media during World War II led to a dehumanization of the enemy—and terrible atrocities inevitably followed.","Question":"How do prejudices and stereotypes influence how wars are fought?","Big Idea":"IN WAR, POPULAR CULTURE CREATES STEREOTYPES TO DEHUMANIZE THE ENEMY.","Summary":"Analyzing the history of Japanese-American relations in World War II through movies, music, news, and cartoons, Dower exposes the link between racial stereotypes and extreme violence, particularly in the context of war. People who are fighting for the enemy are constantly depicted as subhuman—like apes and rats—and this encourages a psychological distancing from them. In turn, this allows people to focus on and justify their obsession with exterminating this enemy. Stereotypes of the Self (\"us\") and the Other (\"them\") have a long and continuous history created by ideas and images.","Category":"History"},{"Book":"The Return of Martin Guerre","Author":"Natalie Zemon Davis","Description":"A sixteenth-century peasant disappears. Another man \"returns\" and claims to be him, aided by his \"wife.\" History, gender analysis, and literary methods are all reexamined in an influential classic.","Question":"How did 'ordinary' people live in sixteenth-century France?","Big Idea":"IT IS ACCEPTABLE TO USE INNOVATIVE METHODS IN HISTORY. THEY CAN HELP US UNCOVER MORE ACCURATE PORTRAYALS OF HISTORICAL FIGURES.","Summary":"Writing the ambiguous, intriguing history of a man who took the place of another in a village in sixteenth-century France, Natalie Zemon Davis takes on incomplete evidence and chooses to incorporate both anthropological studies and even her own creative writing to paint a fuller and, she claims, more accurate picture. Not only does Davis daringly take historical work into ambitious new areas, but she also redefines the role women could potentially play in the sixteenth century, less passive, more active.","Category":"History"},{"Book":"Gender and the Politics of History","Author":"Joan Wallach Scott","Description":"Gender plays a central role in the formation of social hierarchies—so why have historical studies been so blind to it? Scott's analysis of society, language, and the meaning of gender itself provides answers.","Question":"Why, when human history has come so far, does gender inequality remain?","Big Idea":"GENDER IS NOT DECIDED BY NATURE, BUT BY SOCIETY—AND IT'S PLAYED A VERY LARGE PART IN THE LONG HISTORY OF SOCIAL INEQUALITY.","Summary":"When we decide what is \"male\" and what is \"female,\" we make decisions about gender. But that decision isn't really a question of biology, argues Joan Wallach Scott, it's actually about positioning in society and the formation of hierarchies of status and wealth. This means that if we approach historical research with gender in mind, we can shed light on many things that historians have missed—particularly how structures of power are formed and maintained by men.","Category":"History"},{"Book":"The Night Battles: Witchcraft and Agrarian Cults in the Sixteenth and Seventeenth Centuries","Author":"Carlo Ginzburg","Description":"Sixteenth- and seventeenth-century Italian peasants who claimed they left their bodies to fight evil spirits were suddenly persecuted as witches themselves. Ginzburg invented \"microhistory\" to look at how accepted historical records may not always tell the truth.","Question":"How do we remove bias from history – to study the past?","Big Idea":"HOW DO WE REMOVE BIAS FROM HISTORY TO STUDY THE PAST?","Summary":"In the Friuli region of northeastern Italy in the 1500s and 1600s, a small group of men and women known as the benandanti (\"the good walkers\") believed they left their bodies at night to fight dark spiritual forces threatening their crops and communities. Ginzburg develops \"microhistory\"—focusing on particular events and individuals to investigate a broader idea—to examine transcripts from court hearings.","Category":"History"},{"Book":"Roll, Jordan, Roll: The World the Slaves Made","Author":"Eugene Genovese","Description":"How did America's slaves resist their slave masters? And what did they gain through submission? Genovese offers a Marxist analysis of the cultural politics of America's slave years.","Question":"","Big Idea":"AMERICAN SLAVES WERE NOT PASSIVE. WITHIN AN UNEVEN POWER RELATIONSHIP, THEY FORCED CONCESSIONS FROM THEIR OWNERS.","Summary":"Why did slavery exist for so long in America, land of the free? While earlier historians looked at the history of slavery through the eyes of the slaveholders, Genovese took a different approach. He argued that it was vital to understand the psychology and worldview of both the planters and the slaves. The actions and beliefs of both classes interacted, turning the American South into a society unlike any other in the world. It is only by looking at the dynamics of the struggle between the oppressed and the oppressors that the true nature of slavery can be understood.","Category":"History"},{"Book":"Nature's Metropolis: Chicago and the Great West","Author":"William Cronon","Description":"Neighboring urban and rural areas do not grow and develop separately from one another. They are linked together by one unified story where common influences change both landscapes.","Question":"\"Americans have long tended to see city and country as separate places, more isolated from each other than connected\" the historian William Cronon wrote. But are they really as distinct and different as they seem?","Big Idea":"CITIES AND THEIR RURAL SURROUNDINGS ARE NOT SEPARATE. THEY SHARE A COMMON HISTORY AND INTERDEPENDENCY.","Summary":"Using Chicago as a focal point, Cronon goes against the traditional historical view that there are clear divides between the city and the country, the urban and the rural, the human and the natural. Cronon sees the relationship between the city and the country as a unified story, with each part inseparable from, and dependent on, the other. And this dynamic relationship transforms an area.","Category":"History"},{"Book":"The Structure of Scientific Revolutions","Author":"Thomas Kuhn","Description":"Scientific development is not linear, it is cyclical, says Kuhn in this million-selling classic of the history and philosophy of science that completely changed popular understanding of \"science.\"","Question":"","Big Idea":"\"EXTRAORDINARY\" PERIODS DRIVE SCIENCE FORWARD BECAUSE SCIENCE RUNS IN CYCLES; IT ISN'T LINEAR.","Summary":"For centuries, scientists prided themselves on being what they considered \"scientific.\" Their work was based on evidence and observation, painstakingly accumulated over the years to generate advances. But Thomas Kuhn demonstrates that scientific knowledge advances not in a straight line, but in cycles, leading to periods of \"revolutionary science\" where breakthroughs occur. Kuhn questions the idea that science is only based on evidence. He says it has always been based on certain unspoken assumptions, calling these assumptions \"paradigms.\" Scientific revolutions can only occur when the existing paradigm changes.","Category":"History"},{"Book":"Hitler's Willing Executioners: Ordinary Germans and the Holocaust","Author":"Daniel Goldhagen","Description":"A controversial explanation of the Holocaust that claims deep-seated anti-Semitism throughout German culture and history led its people to embrace the genocidal doctrine of their leaders.","Question":"Did the perpetrators of the Holocaust kill Jewish people because of orders from above? Or were they willing participants with a long history of anti-Semitism?","Big Idea":"THE GERMAN PEOPLE WERE TO BLAME FOR THE HOLOCAUST—NOT JUST THE NAZI LEADERS.","Summary":"Daniel Jonah Goldhagen challenges his readers to think about the wider social context in which the Holocaust happened. What motivated the German people to allow the overtly racist Nazis to rise to power in 1933? And why did they carry out their murderous orders and kill so many Jews? Goldhagen says that a uniquely German form of deep-seated anti-Semitism meant the German people actually rejoiced in the idea. And so they shared a collective responsibility for mass murder on an industrial scale.","Category":"History"},{"Book":"Citizen and Subject: Contemporary Africa and the Legacy of Late Colonialism","Author":"Mahmood Mamdani","Description":"If there is a crisis in African democracy, Mamdani argues, we cannot simply blame poor government or corruption—its roots lie in the legacy of colonialism.","Question":"Why has democracy found it so hard to take root in post-colonial Africa?","Big Idea":"PROBLEMS IN THE AFRICAN STATE ARE NOT HOME GROWN—THEY ARE PART OF THE LEGACY OF COLONIALISM.","Summary":"Many have claimed that the failure of post-independence African countries to govern themselves effectively is down to incompetence and corruption. Mamdani says this is wrong. It is down to the systems of government these states inherited from their European colonizers. He shows how the disconnect between urban and rural areas, and commonly held views about group identity that still exist in Africa today, were neither traditional nor natural to Africans.","Category":"History"},{"Book":"Ordinary Men: Reserve Police Battalion 101 and the Final Solution in Poland","Author":"Christopher Browning","Description":"The evil of the Holocaust wasn't perpetrated by monsters, but by ordinary men like those of Reserve Police Battalion 101. Can particular circumstances provoke anyone to commit unspeakable acts?","Question":"What best explains the motivations of the men who perpetrated the Holcaust? Ideology – or tribal loyalty?","Big Idea":"UNDER CERTAIN CONDITIONS, ORDINARY MEN WILL COMMIT ATROCITIES","Summary":"Widely shared human traits—a tendency to obey those in authority, susceptibility to peer pressure, a desire for promotion—can turn ordinary people into killers. Browning researched a World War II German reserve police battalion. Following orders, these middle-aged policemen killed thousands of unarmed Jewish men, women, and children, shooting them at close-range. Twenty years on, they were interviewed about their actions. Browning argues that these killers were not battle-hardened soldiers or psychopaths. They were ordinary men.","Category":"History"},{"Book":"The Global Cold War: Third World Interventions and The Making of Our Times","Author":"Odd Arne Westad","Description":"During the Cold War, the Soviet Union and the United States frequently \"intervened\" in the developing world. Westad reveals how and why we are living with the dangerous consequences of this action today.","Question":"How did the Cold War shape the world we live in today?","Big Idea":"TODAY'S GLOBAL INSTABILITY IS A COLD WAR RELIC; SUPERPOWER INTERVENTIONS IN THE THIRD WORLD ARE TO BLAME.","Summary":"The Cold War was fought between competing ideologies. Both sides considered themselves heirs to a tradition of freedom and justice that would decide the future. But both felt the need to give history a little nudge to prove them right. To do this, they systematically intervened in the affairs of nations in the developing world, altering the political landscape, instigating changes in governments and sponsoring wars. The worldwide instability we all suffer today is the unwanted result of these actions.","Category":"History"},{"Book":"Religion And The Decline Of Magic","Author":"Keith Thomas","Description":"What are magical beliefs \"for\"? And why did they all but disappear as England entered the 1700s? A classic, influential work of social history that is highly regarded as a major feat of research.","Question":"Belief in the powers and effects of magic was widespread in medieval and early modern Europe. But what eventually led to its decline?","Big Idea":"BELIEF IN MAGIC ONCE SERVED A PURPOSE. SCIENTIFIC PROGRESS AND RELIGIOUS CHANGE LED TO DIFFERENT THINKING AND DIMINISHED MAGIC'S POWER.","Summary":"For an English man or woman in 1500, witchcraft, spirits, and spells were an important and integral part of daily life. But by 1700, these deeply held beliefs were nowhere near as widespread. Why? Thomas concludes that magical thought had traditionally helped people understand and cope with everyday problems. Yet the emergence of the more rational Protestant Church and advances in science eroded its hold.","Category":"History"},{"Book":"The Age of Revolution: Europe 1789–1848","Author":"Eric Hobsbawm","Description":"A classic Marxist analysis of Europe at the time of the French Revolution and the British Industrial Revolution. Politics, power, capitalism, socialism—and the birth of the modern era.","Question":"What forces shaped the modern world?","Big Idea":"DUAL REVOLUTIONS IN FRANCE AND BRITAIN SHAPED EUROPE.","Summary":"What explains the rapid spread of a capitalist economy and liberal politics across northwest Europe in the early nineteenth century? It all started with the \"dual revolution,\" says Eric Hobsbawm. Britain's late-eighteenth-century industrial revolution unleashed tremendous economic growth. France's political revolution—beginning in 1789—spread ideas of social justice and universal brotherhood. A middle class was formed and benefited from these changes. But the working poor were exploited and left behind, leading to the emergence of socialism.","Category":"History"},{"Book":"The Significance Of The Frontier In American History","Author":"Frederick Jackson Turner","Description":"An explanation of modern America as the product of ordinary people's struggles since the sixteenth century to settle North America.","Question":"Why did American history - and the American character – turn out the way it did?","Big Idea":"FRONTIER LIFE SHAPED THE MODERN AMERICAN CHARACTER.","Summary":"By 1890, Americans had settled all of North America. Yet while this event went relatively unnoticed among his peers, historian Frederick Jackson Turner used it to seize on a new concept of what shaped American character and American values. Jackson argued that as colonizers from Europe moved west, their new settlements met the wilderness head on, and so these people needed to show determination and individuality, which shaped the country's unique characteristics.","Category":"History"},{"Book":"A History of the Arab Peoples","Author":"Albert Hourani","Description":"An unsurpassed investigation of Arab history from its origins to the late twentieth century. The book meticulously analyzes the Arab world's often-ignored diverse social, cultural, religious, and economic structures.","Question":"How were the rich political, social and cultural institutions of Arab life created?","Big Idea":"ARAB CIVILIZATION DID NOT PEAK AND THEN DECLINE. IT HAS ALWAYS BEEN VIBRANT, DYNAMIC, AND DIVERSE.","Summary":"Traditional Western scholarship pictured Arab history as a thousand-year tale of decline after the tenth century. Hourani rejected this. His sweeping overview of Arab civilization proved otherwise, starting with the emergence of Islam in the seventh century and ending with the Cold War in the 1980s. Weaving together politics, religion, and economics, with social and cultural history, Hourani showed how the people of the Middle East and beyond were bound together through the Arabic language, while expertly laying out the rich diversity of the Arab world.","Category":"History"},{"Book":"Course in General Linguistics","Author":"Ferdinand de Saussure","Description":"A groundbreaking book that changed the study of language by insisting that the basic structure of our communication is always the same, even when the language differs. It is just the particular words and sounds that change.","Question":"What is the nature of language and its relation to ideas?","Big Idea":"THE STRUCTURE OF LANGUAGE IS THE SAME EVERYWHERE.","Summary":"The study of language—known as linguistics—lacks consistency. It needs to be standardized and developed into a more coherent science. Language should be understood as a set of units that make sense in relation to one another (structuralism). All languages are self-contained systems whose parts are arbitrary—they are not based on anything outside the system. The basic structure of the system is not specific to any particular language; it is only the words, syntax, and sounds that vary.","Category":"Literature"},{"Book":"The Location of Culture","Author":"Homi K. Bhabha","Description":"A controversial approach to theory that uses concepts such as 'hybridity' and 'liminality' to argue that cultural production occurs on the margins.","Question":"How can we understand postcolonial culture?","Big Idea":"THE WHOLE CONCEPT OF IDENTITY NEEDS TO BE CHALLENGED.","Summary":"Simplistic divisions between the West and the East, or \"Other\" are of little use. In fact, when two cultures or nations meet, ideas, language, and material goods are shared between them. That sharing forces both to adapt and change. For this reason, there can be no \"pure\" Western or Eastern culture or nation. We have all become hybrids, collages of different cultures, both on a national and personal level. Identity is not fixed; it is flexible.","Category":"Literature"},{"Book":"A Vindication of the Rights of Women","Author":"Mary Wollstonecraft","Description":"This radical eighteenth-century work challenges the idea that the oppression of women by society is natural and inevitable. It explores how best to educate women so they are not forced into continued moral and intellectual dependence on men.","Question":"What is the place of women in society?","Big Idea":"CHARACTER IS THE PRODUCT OF NURTURE, NOT JUST NATURE.","Summary":"Society in general would benefit from an equal contribution from men and women. Perceived fundamental differences between the sexes are not the result of biology, or because men and women somehow have different souls; they are fundamentally a question of education and upbringing. Men and women have different bodies, but this does not mean they necessarily have different characters, or that they have different purposes in life. We must not use these differences as an excuse to deny women the same rights and freedoms as men.","Category":"Literature"},{"Book":"Characteristics of Negro Expression","Author":"Zora Neale Hurston","Description":"A discussion of African American art as a process and a way of living, as opposed to a fixed collection of products. African Americans find opportunities for creative cultural expression everywhere, from slang to religion to home decorating, despite operating within white culture.","Question":"How did black culture in America develop and influence society?","Big Idea":"AFRICAN AMERICAN CREATIVE EXPRESSION IS A PROCESS. IT TURNS BORROWED MATERIAL FROM ALL AREAS OF LIFE INTO SOMETHING ORIGINAL AND UNIQUE.","Summary":"How does African American art in the early twentieth century differ from that of white America or Europe? African American creativity begins with \"mimicry.\" \"Mimicry\" is not direct copying, but an approach that takes whatever it imitates and changes it into something new. Mimicry applies not only to traditional arts like poetry and painting, but to any area of life where African Americans express themselves: religion, slang, home decorating, and more.","Category":"Literature"},{"Book":"Can the Subaltern Speak?","Author":"Gayatri Spivak","Description":"A powerful work claiming subalterns—the poorest, most marginalized populations—have no way to voice their concerns. Western academics attempting to speak for them compound the injustice by robbing the poor of their own voice.","Question":"","Big Idea":"THE POOREST PEOPLE SUFFER NOT ONLY FROM BEING POOR—THEY ALSO HAVE NO VOICE.","Summary":"The subalterns are the poorest and most powerless in developing countries. They have no platform to voice their concerns and their interests because society excludes them from public debate. What's more, when local elites (government officials, religious leaders, etc.) or Western scholars assume to talk for these poor—or indeed simply leave them out of historical accounts, or discussions of current issues—that is a form of violence. True, it is violence in the form of language.","Category":"Literature"},{"Book":"A Room of One's Own","Author":"Virginia Woolf","Description":"Why have there been so few great women writers in history? Because writing demands privacy and financial security. This has been denied to women by a male-dominated society, and true equality requires not just equal rights, but equality in everyday life","Question":"","Big Idea":"TO BECOME GREAT WRITERS, WOMEN NEED A PRIVATE SPACE AND THEIR OWN INCOME.","Summary":"Why are there so few famous women writers in literary history? It's not because women are inferior; it's because creativity can only thrive when an artist has privacy and freedom from financial worries. Historically, women have had neither, which means they have not had a tradition of great female writing to inspire them either. True equality between the sexes is about much more than just voting and legal rights. Ordinary, everyday life must be altered too.","Category":"Literature"},{"Book":"Playing in the Dark: Whiteness and the Literary Imagination","Author":"Toni Morrison","Description":"Racial inequality affects us all, even those who benefit from that inequality. Playing in the Dark shows how racism has manifested itself in the American literary imagination and defined the American national identity","Question":"How are 'literary whiteness' and 'literary blackness' made?","Big Idea":"THINK RACE ONLY APPEARS IN STORIES ABOUT RACISM? THINK AGAIN.","Summary":"Within every \"universal\" narrative, the shadow of race lurks between the lines. The American national identity was built on a game of paradoxes. The negative associations projected onto African Americans created a type against which white America could define itself, and project its fears, anxieties, desires, and taboos. Black bondage and the myth of black savagery allowed white America to view itself as free, civilized, and innocent.","Category":"Literature"},{"Book":"Gender Trouble","Author":"Judith Butler","Description":"Gender is not simply a question of what society makes of your sex organs. What if it's the things a person does that defines it? Gender Trouble is a foundational text in queer theory that challenged feminist orthodoxies in the 1990s.","Question":"Are we assigned our gender at birth – or do we simply \"perform\" one, based on the values we have learned?","Big Idea":"SEX AND GENDER ARE NOT THE SAME THING.","Summary":"Is anyone really male or female? Masculine or feminine? Gay or straight? What's \"normal\" anyway? There is actually a whole range of sexual and gender identities and everything we do is to fit in with what society tells us to \"be\"—an act that makes itself real. Gender is just an act we're forced to adopt, and eventually believe, to be considered \"normal\" in our culture. Even our biological sex might be more to do with a state of mind than the reality of nature.","Category":"Literature"},{"Book":"An Image of Africa: Racism in Conrad's Heart of Darkness","Author":"Chinua Achebe","Description":"A passionate attack that denounces Joseph Conrad's much-admired novel, Heart of Darkness long hailed as a masterful critique of European imperialism as racist, and an expression of European contempt for African people.","Question":"Joseph Conrad's Heart of Darkness; a savage critique of the colonial occupation of the Congo….and a long standing fixture in the canon of English literature. But did Conrad's well-known anti-imperialist novel mask racist attitudes of his own?","Big Idea":"HEART OF DARKNESS IS A RACIST WORK. BY NOT EXPOSING ITS RACIST AND COLONIALIST ATTITUDES, CRITICS AND READERS HAD TACITLY SUPPORTED THESE VIEWS.","Summary":"Far from being an attack on Western imperialism, Joseph Conrad's 1899 novel Heart of Darkness is an expression of precisely those dehumanizing tendencies towards Africa that colonialism produces. Achebe argues that Conrad's book reflects the West's implicit belief in African savagery and inferiority. This is the result of a psychological need in the West to project Africa as uncivilized and bestial.","Category":"Literature"},{"Book":"Mythologies","Author":"Roland Barthes","Description":"Something is hiding inside the images and symbols of daily life: the ideological principles of a modern consumer society, invisible without careful analysis, forming myths that we live by, but can't even detect.","Question":"How can dominant ideologies successfully present themselves as simply the way the world should be?","Big Idea":"THE POPULAR MEDIA COMMUNICATES HIDDEN MESSAGES: THEY USE A TYPE OF LANGUAGE CALLED MYTH.","Summary":"Common objects and experiences have been drained of their true meaning, leaving an empty vessel that can simply be repackaged by the establishment to reinforce values that work in their favor. Using iconic examples from 1950s France, Barthes explains how popular culture works like traditional mythology, putting forward ideas and beliefs that then become accepted as true. It is films, adverts, and national pastimes that provide the messages that ultimately determine the values of society.","Category":"Literature"},{"Book":"The Second Sex","Author":"Simone de Beauvoir","Description":"A truly bold account of what it means to be a woman in a world where society, ruled by men, robs women of their individuality and their voice. This is a landmark text in the history of women's rights.","Question":"","Big Idea":"FEMALE IDENTITY IS SHAPED IN A WORLD RULED BY MEN, WHERE WOMEN ARE RAISED TO BE SECOND-CLASS CITIZENS.","Summary":"Women are forced to play a subordinate role in every area of life, from sex and family to work and politics. This is because the rules of society in general—and sexual behavior in particular—have always been written by men. Society and women's role in it are based around powerful cultural myths regarding the nature of femininity—myths that combine to rob women of their voice and independence. Women are not born inferior, insists de Beauvoir. It is their oppressive upbringing that denies them the same power and freedom as men.","Category":"Literature"},{"Book":"The Sacred Wood","Author":"T.S. Eliot","Description":"\"How should a poet relate to a poem? And what is tradition?\" Critical essays from a major poet, and a statement of guiding principles for literary achievement","Question":"What relationship should a poet have with the poets of the past?","Big Idea":"LITERARY WORKS MUST BE JUDGED AGAINST THE BEST OF THE PAST—BY BOTH WRITERS AND CRITICS","Summary":"The Romantic poets of the nineteenth century valued self-expression. But Eliot rejects their approach, arguing that poetry should express universal values and emotions. He calls this \"impersonality,\" and how successfully a work achieves this determines its greatness. Eliot argues that all works of literature should be assessed on these terms, and integrate into a \"tradition\" that involves all works from the past—a tradition that will constantly evolve as new works are written and added to it.","Category":"Literature"},{"Book":"Dialogues Concerning Natural Religion","Author":"David Hume","Description":"A hugely important work that asks perhaps the greatest question of all: Is there a God? The only way we can hope to answer this question is to build arguments based on what we experience through our senses.","Question":"On what basis do people hold religious beliefs?","Big Idea":"HOW CAN WE KNOW IF GOD EXISTS—AND WHAT IS \"GOD\" ANYWAY?","Summary":"What do we know about God? And how do we know it? If the universe looks designed, must there be a great designer? Or can there be no God because there is evil? Is God a sort of super-person who intervenes in our lives, or a disinterested great architect? And can we ever really know the true nature of God, anyway? We must examine these important questions empirically, building a case based on what we experience through our senses.","Category":"Philosophy"},{"Book":"Nicomachean Ethics","Author":"Aristotle","Description":"Argues that the highest good for human beings is happiness and presents a rich account of what happiness consists in.","Question":"What actions are needed to live well?","Big Idea":"HAPPINESS IS A LIFE OF VIRTUOUS ACTIVITY. IT IS NOT JUST AN EMOTIONAL STATE.","Summary":"What is the ultimate in human good? It is eudaimonia, and that means happiness, or flourishing. The key to achieving eudaimonia is a combination of virtuous activity and philosophical reflection. The type of activity needed is based on moral qualities like justice, temperance, generosity, friendship, and courage. The reflection depends on intellectual qualities, including scientific knowledge, practical wisdom, and intelligence. These virtues cannot simply be taught—they must be developed over time through virtuous habits and moral education.","Category":"Philosophy"},{"Book":"The Human Condition","Author":"Hannah Arendt","Description":"A classic of political science, explaining why political action is vital in everyone's life. People must work together to create new institutions and shape a common, improved destiny, while recognizing and respecting the diversity of the human condition.","Question":"","Big Idea":"POLITICAL ACTION IS THE MOST IMPORTANT HUMAN ACTIVITY. IT ALLOWS PEOPLE TO WORK TOGETHER TO CREATE NEW AND IMPROVED INSTITUTIONS.","Summary":"Human life is defined by three activities: labor, work, and action. Labor includes what we do to support our daily needs, such as feeding ourselves. Work includes things we do that will outlive our immediate lives, like science, art, and literature. Action is political activity where people work together to shape a common destiny. But politics has become too focused on bureaucratic solutions. A more participatory politics is needed.","Category":"Philosophy"},{"Book":"The Sickness Unto Death","Author":"Soren Kierkegaard","Description":"Kierkegaard contemplates existence as it specifically relates to the individual rather than something abstract. He examines the problem of despair and finds the solution in the Christian faith.","Question":"","Big Idea":"\"THE OPPOSITE TO BEING IN DESPAIR IS TO HAVE FAITH.\"","Summary":"Despair, says Kierkegaard, is necessary. Think of it, he says, as the opposite of sin. Without despair, we would not achieve the spiritual development required if we are to establish an authentic relationship with God, which is the ultimate goal of anyone serious about their Christian faith. A Christian must see her or himself standing before God. This, for Kierkegaard, is true Christianity, not the conformist faith of the institutional church.","Category":"Philosophy"},{"Book":"Beyond Good and Evil: Prelude to a Philosophy of the Future","Author":"Friedrich Nietzsche","Description":"A radical work of philosophy exploring what a world free of God and uninhibited by traditional concepts of \"good\" and \"evil\" might look like, and where it could lead humanity.","Question":"","Big Idea":"GOD IS DEAD—AND IN HIS WAKE A NEW MORALITY MUST BE CONSTRUCTED.","Summary":"Beyond Good and Evil urges its readers to truly question the inherited Judeo-Christian values of our culture. Nietzsche encourages a radical reimagining of what a life free of the burden of belief in God might look like. He moves past traditional ideas of morality that position \"good\" as the opposite of \"evil,\" and explores how subconscious instincts inform human behavior. Nietzsche proposes that his \"philosophers of the future\" should determine the qualities we should aspire to and what direction humanity should follow.","Category":"Philosophy"},{"Book":"Religion Within the Boundaries of Mere Reason","Author":"Immanuel Kant","Description":"It is people, not the Church, who should shoulder the real responsibility for being moral. Kant controversially argues that the Church's rules and practices wield too much control over how people create God's Kingdom in the world.","Question":"How can we live virtuously – in an unvirtuous world?","Big Idea":"IF GOD IS UNKNOWABLE, WHAT DOES THIS MEAN FOR MAN AND MAN'S MORALITY?","Summary":"When the most famous philosopher of his time started quoting scripture and talking theology, many scholars were confused. Kant argues here that God is unknowable and it is human beings who have the responsibility to create the Kingdom of God in the world we experience by acting morally. This view angered the Church and the government—which was partly the point.","Category":"Philosophy"},{"Book":"Ethics","Author":"Baruch Spinoza","Description":"God is nature; nature is God. If human beings are simply another part of nature, how should we understand our passions and our thoughts? And what is our place in the structure of reality?","Question":"","Big Idea":"EVERYTHING THAT EXISTS IS A FORM OF A SINGLE SUBSTANCE, GOD OR NATURE—AND THEY ARE THE SAME.","Summary":"What is God and what is the place of human beings in the universe? The common idea of an \"anthropomorphic\" God is of an entity with human qualities, who can love people and punish evil-doers. But for Spinoza, this demands human free will, and free will is an illusion. In reality, human freedom comes from the recognition that the universe is deterministic—that every event follows from a cause that makes it necessary. Yet true happiness is still possible through an intellectual love of God.","Category":"Philosophy"},{"Book":"The Phenomenology of Spirit","Author":"G. W. F. Hegel","Description":"Philosophy cannot rely on reason alone—it must account for consciousness, too. Perception, knowledge, ethics, and society are examined in this extraordinarily influential text in the canon of Western thought.","Question":"What theories have had a profound effect on Western philosophy?","Big Idea":"WE MUST UNDERSTAND EVERYTHING TO KNOW ANYTHING.","Summary":"In Hegel's view, our perception of reality is flawed. Any examination of an object through our senses is limited by our own experience and so a \"common sense\" approach to philosophy is inadequate. Reality is more complex than it might appear, too. Everything, according to Hegel, is interrelated and forms what he calls the \"Absolute.\" Only by understanding the Absolute can we discover what really matters.","Category":"Philosophy"},{"Book":"Modern Moral Philosophy","Author":"Elizabeth Anscombe","Description":"Modern philosophers are incorrect to judge actions \"wrong\" or \"right\" according only to their consequences, says Anscombe in a paper that acts as a challenge to the foundations of modern philosophy, and sees the birth of a modern version of \"virtue ethics.\"","Question":"Where do society's moral obligations come from?","Big Idea":"CAN MORAL PHILOSOPHY EXIST WITHOUT A BELIEF IN GOD?","Summary":"Without belief in a God who gives laws about how humans should behave, there can be no absolute rules about morality. In the nineteenth and twentieth centuries, philosophers had argued that such rules could exist even in a secular society. Anscombe says that without a divine authority, the ideas of \"obligation\" and moral \"oughts\" become meaningless. So in a secular society, it is better to look elsewhere for a new model for moral philosophy, such as one based on psychology and the virtue ethics developed by the ancient Greek philosopher Aristotle.","Category":"Philosophy"},{"Book":"On the Genealogy of Morality","Author":"Friedrich Nietzsche","Description":"Nietzsche abandons traditional assumptions of Christian morality and explores different ways of understanding what it means to be \"good\" by tracing the meaning and uses of the word through history and across different cultures.","Question":"Is it really self-evident that the best moral system is one that emphasises compassion and virtue?","Big Idea":"WHAT WE ACCEPT AS \"GOOD\" AND \"EVIL\" IS NEITHER NATURAL, NOR INEVITABLE.","Summary":"Is it necessarily good to be compassionate, humble, and selfless? The dominant Judeo-Christian morality says yes. But how did this view come to hold sway? Our moral code has developed because the weak and mediocre masses have developed it to undermine their natural masters, the strong and the fearless. This morality might now be holding back humanity's ability to reach its full potential.","Category":"Philosophy"},{"Book":"Critique of Pure Reason","Author":"Immanuel Kant","Description":"In a work claimed by Kant himself to be \"revolutionary,\" the philosopher brings intriguing new thinking to the way we gain knowledge and what this means for the practice of philosophy itself.","Question":"What can reason alone determine - without the help of our senses?","Big Idea":"HOW IS IT POSSIBLE TO KNOW ANYTHING ABOUT THE WORLD?","Summary":"Kant argues that the human mind can recognize its own limitations. He is curious about how much we can understand using reason alone. To understand the world we live in, therefore, we must first understand the human mind, as our knowledge of the world stems as much from the resources we bring to it as it does from the input we receive from it. We have to move inward to the workings of the mind to understand the outside world.","Category":"Philosophy"},{"Book":"Two Treatises of Government","Author":"John Locke","Description":"No monarch has a God-given right to rule. The people hold ultimate authority. If your government isn't serving you—get a new one.","Question":"","Big Idea":"A MONARCH'S RIGHT TO RULE DOES NOT COME FROM GOD, BUT FROM THE PEOPLE HE RULES.","Summary":"In the mid-seventeenth century England did away with the monarchy and tried different systems of government, before opting to restore a king to the throne. This turmoil prompts Locke to explore where a king's power actually comes from. He decides that a sovereign is there to keep order in society, and that the people enter into a kind of contract with him. The sovereign protects the people and keeps order in return for the people's support. But if that sovereign does not take his responsibilities seriously and obey the law himself, then someone else should rule.","Category":"Philosophy"},{"Book":"Philosophical Investigations","Author":"Ludwig Wittgenstein","Description":"Wittgenstein argues that most philosophical problems are actually down to our false assumptions about language in this classic of twentieth-century thought.","Question":"How do we understand and process words?","Big Idea":"MEANING IS USE—IT EXISTS IN THE CONTEXT OF LANGUAGE.","Summary":"Only by understanding how particular cultures and communities use language can we truly understand meaning. Ideas exist beyond the abstract; they are part of language and are influenced by setting and context, such as when people use language to buy food, make jokes, or play games. Meaning is, therefore, both public and social. Philosophers often face problems that they struggle to resolve, particularly if they focus on inventing new theories. Instead, they should try to better understand language itself.","Category":"Philosophy"},{"Book":"Is Justified True Belief Knowledge?","Author":"Edmund Gettier","Description":"A remarkable challenge to a 2,000-year-old definition of knowledge proving that it cannot necessarily be defined as a belief that is both true and justified.","Question":"How do we define knowledge?","Big Idea":"A 2000-YEAR-OLD DEFINITION OF KNOWLEDGE IS FLAWED—PROVED IN JUST 930 WORDS.","Summary":"The ancient Greek philosopher Plato's definition of knowledge was that it was justified true belief. I know, for example, that I am human because: 1) I believe I am human, 2) my belief is justified, and 3) it is true. But in 1963, Edmund Gettier published a short paper with two counter-examples showing that justified true belief is not necessarily knowledge. Gettier's article set off a storm in the philosophy community.","Category":"Philosophy"},{"Book":"After Virtue","Author":"Alasdair MacIntyre","Description":"How can we make moral judgments if there is no agreed standard? By considering the ancient role of virtue, argues MacIntyre in this vital, controversial work of twentieth-century moral philosophy.","Question":"How can moral philosophy be reformed and restored to a central place within its discipline?","Big Idea":"WHAT IS THE GOOD LIFE?","Summary":"Modern moral philosophy has no common standards of judgment agreed by all philosophers, so it can no longer tell people how to live a good life. There are no absolutes any more, since views on morality are seen as relating to a particular culture, society, or context. So it is necessary to go back to Aristotle and original concepts about virtues, morality, and politics to restore an essential function of the philosopher.","Category":"Philosophy"},{"Book":"Metaphysics","Author":"Aristotle","Description":"In one of the most influential texts in all Western philosophy, Aristotle discusses the very nature of \"being\" itself.","Question":"What makes a thing a thing?","Big Idea":"IF SOMETHING HAS A FORM, IT EXISTS.","Summary":"The ancient Greek philosopher Plato taught his students that everything we can see is an imperfect model of its perfect \"form,\" which exists elsewhere in the universe. His greatest student, Aristotle, disagreed. Form does not exist without matter, he argues in his Metaphysics, employing a finely reasoned analysis of the nature of substance. When we discuss substance, we should be talking about objects, he argues, not their abstractions. Form is substance in matter.","Category":"Philosophy"},{"Book":"The Concept of Mind","Author":"Gilbert Ryle","Description":"Is there really a difference between \"body\" and \"mind,\" as Descartes argued? Is your mind actually an illusion; is there a \"ghost in the machine\"? Ryle's provocative and highly influential work helped establish the field of \"philosophy of mind.\"","Question":"Mind and body. Are they linked, or quite separate?","Big Idea":"YOUR MIND IS NOT SIMPLY THE \"GHOST IN THE MACHINE.\" IT DOES NOT MYSTERIOUSLY INHABIT THE BODY SOMEHOW.","Summary":"The seventeenth-century philosopher René Descartes argued that the mind was a separate entity from the body. Ryle rejected this notion in its entirety on the grounds that mental processes could not so easily be isolated from the physical world. For example, knowing how to play a musical instrument is a case of putting thought into action, and when we observe the body we are actually observing the mind in action.","Category":"Philosophy"},{"Book":"An Enquiry Concerning Human Understanding","Author":"David Hume","Description":"Setting out to construct a science of the mind, Hume looks at the way we gain knowledge and form our beliefs in this seminal work of Western philosophy.","Question":"Can we really rely on our senses?","Big Idea":"PHILOSOPHY DEMANDS THAT WE SUSPEND ALL OUR BELIEFS. BUT SOME BELIEFS ARE NECESSARY FOR US TO THRIVE IN THE REAL WORLD.","Summary":"Scientists made significant advances in knowledge during the eighteenth century. Many among them—called empiricists—wanted to make sure that each advance was grounded in experimentation and observation. But David Hume was convinced that certain things simply cannot be proven by experience, arguing that philosophical reasoning insists we cannot know anything about the world. Nevertheless everyone needs beliefs so they can live well.","Category":"Philosophy"},{"Book":"The Abolition of Man","Author":"C.S. Lewis","Description":"Modern education teaches that morality is subjective. But morality, like beauty, comes from a place that transcends time and culture. If we fail to accept this, then the result will be a world descending into chaos.","Question":"How important are universal values?","Big Idea":"WHAT IS MORAL IS NOT SUBJECTIVE—AND IT IS DANGEROUS TO THINK IT IS.","Summary":"C. S. Lewis believed that all important religions and ancient philosophies placed the definition of morality in the hands of an objective source beyond human understanding. For Christians, this was God. However, when Lewis was writing in the mid-twentieth century, academic philosophers preferred the idea of moral relativism. This meant that no set of moral beliefs was better than any other—it was a matter of personal preference. This worried Lewis.","Category":"Philosophy"},{"Book":"Meditations","Author":"René Descartes","Description":"Doubt is a powerful tool in the pursuit of knowledge, argues Descartes in this extraordinarily influential investigation of mind, body, and skepticism as a philosophical method.","Question":"How do I know what actually exists?","Big Idea":"WHAT CAN WE TRULY KNOW—ABOUT OUR OWN EXISTENCE, ABOUT GOD AND THE WORLD, AND ABOUT THE TRUE RELATIONSHIP BETWEEN MIND AND BODY?","Summary":"In a seventeenth-century world where scientific progress was challenging much established thinking, Descartes looks to counter an emerging skeptical view that true knowledge of anything is impossible. He does this by trying to establish foundations for knowledge. Starting off by doubting everything, Descartes shows we can discover what bits of knowledge lie beyond doubt, such as our own thought. \"I think, therefore I am.\"","Category":"Philosophy"},{"Book":"Fear and Trembling","Author":"Soren Kierkegaard","Description":"Seemingly unethical acts can be justified—but only if God demands them. Kierkegaard examines the idea of true faith and concludes that it requires a terrifying trust in God.","Question":"","Big Idea":"DOES GOD ASK US TO DO UNETHICAL THINGS?","Summary":"The Bible says God told Abraham to sacrifice his son, Isaac. This created a serious ethical dilemma: obey and you commit murder, which is a sin. Disobey, and you have disobeyed God—and what higher sin can there be? Kierkegaard was not the first philosopher to analyze this story. But he was the first to argue that in following God's will, Abraham had acted ethically. Reacting against the highly dogmatic Church of Denmark, Kierkegaard argues that to be a true Christian, each person must take a \"leap of faith\" and trust in God, not institutions.","Category":"Philosophy"},{"Book":"Symposium","Author":"Plato","Description":"Greek philosopher Plato offers an enjoyable discussion of the ways erotic love can help us attain knowledge, a sense of ethics, and even understanding of the very nature of being.","Question":"What is the role of love in the human pursuit of wisdom, virtue and happiness?","Big Idea":"EROTIC DESIRE CAN LEAD US TO VIRTUE, WISDOM, AND BEAUTY.","Summary":"For Plato, the practice of philosophy has a specific aim: attaining the virtue, wisdom and happiness that lead to \"the good life.\" And erotic desire—\"Eros\"—is a means to that end. Eros is not an invasive, outside force leading people to all kinds of irrational behavior. In fact, appropriately directed, it is a sure means to gain knowledge, ethics, an appreciation of law, and, eventually, a glimpse of Beauty itself—the very source of all virtue.","Category":"Philosophy"},{"Book":"Meditations","Author":"Marcus Aurelius","Description":"An inspiring ancient text that explains how and why we can use philosophy in our everyday lives to solve problems, keep our desires in check, and live better, happier lives.","Question":"How can we overcome our everyday personal struggles?","Big Idea":"A GOOD LIFE IS A HAPPY LIFE.","Summary":"Philosophy is an important tool we can use every day to help us understand and deal with the problems of everyday life. The best way to get to the bottom of a problem is to analyze its different aspects with care. This will help to \"dissolve\" the issue. To keep our minds well balanced, it is vital to keep our desire for the material and the sensual in check to avoid falling prey to negative behaviors like jealousy, quarrelling, and indulgence.","Category":"Philosophy"},{"Book":"World Order: Reflections on the Character of Nations and the Course of History","Author":"Henry Kissinger","Description":"An authoritative yet accessible account of how different cultures in different eras have viewed the concept of world order, while looking to impose stability in an inherently volatile world.","Question":"How do different nation states view world politics?","Big Idea":"WHAT IS WORLD ORDER AND HOW CAN IT BE REDEFINED TO WORK FOR EVERYONE?","Summary":"In a modern era wracked by conflict and instability, there are many political questions that need to be answered in the search for a better world. How can order be imposed? What lessons does history have for us? Should states place their own national interests above all others? Should they seek solutions through international bodies such as the United Nations? Can force ever be used legitimately?","Category":"Politics"},{"Book":"Iran: A People Interrupted","Author":"Hamid Dabashi","Description":"Why does Iran act as it does? How do 200 years of literature explain the modern Iranian mindset? Respected Iranian American thinker Dabashi uses the cultural history of his homeland to explain Iran's psyche of resistance.","Question":"What explains the unique history of Iran in the last two centuries?","Big Idea":"IT IS IN THE IRANIAN PSYCHE TO RESIST DOMINATION AND OPPRESSION.","Summary":"To understand this mind-set it is vital to understand the country's intellectual history. It shows that a rich blend of ideas and art has contributed to the fight against suppression from colonial powers abroad, and royal or religious rulers at home. Condescending Western scholars are \"dead wrong\" about Iran being trapped between tradition and modernity. The country has developed a unique anti-colonial modernity—one governed on Iranian terms and not anyone else's.","Category":"Politics"},{"Book":"Imagined Communities","Author":"Benedict Anderson","Description":"The arrival of the printing press, and then of Enlightenment philosophy, gave people totally new ways of seeing the bonds between individuals and their locality. This created the modern nation and nationalism, fueling movements for independence and self-rule.","Question":"Why do separate communities develop a shared national identity?","Big Idea":"THE PRINTING PRESS TRANSFORMED OUR VIEW OF THE WORLD, AND FORGED THE MODERN CONCEPTS OF NATIONHOOD AND NATIONALISM.","Summary":"The mass production of affordable books and the shift from printing in Latin to the use of common languages understood by ordinary people sparked the spread of Enlightenment values of liberty, progress, secularism, and equality. This created in people a profound emotional bond to \"imagined communities\"—the idea of nation that reaches beyond common people's immediate locality. This new sense of connection between citizens of a nation who have never met each other has inspired a loyalty so strong that many are willing to sacrifice their lives to preserve it.","Category":"Politics"},{"Book":"Civil Disobedience","Author":"Henry David Thoreau","Description":"When is it right to disobey the law and actively defy government? Thoreau believes it is when your conscience tells you that government's policies are wrong. Then it is your absolute duty to resist.","Question":"","Big Idea":"OUR OWN CONSCIENCE IS MORE IMPORTANT THAN STATE LAWS—IF WE FEEL THOSE LAWS ARE UNJUST WE MUST BREAK THEM.","Summary":"A dilemma often exists when a person strives to be moral, while at the same time being subjected to the power of the state. When citizenship and conscience are in conflict and a person truly feels that following government laws is unjust, then it is that person's moral duty to resist and break the law—even if it means going to jail. Thoreau believes government is always liable to be abused and perverted.","Category":"Politics"},{"Book":"The Social Contract","Author":"Jean Jacques Rousseau","Description":"A radical piece of eighteenth-century thinking arguing that the only fair way for society to be governed is for it to be led by the collective will of the people. Individuals choose to give up some of their freedoms to enter into a social contract with each other.","Question":"","Big Idea":"THE ONLY LEGITIMATE FORM OF GOVERNMENT IS RULE BY THE PEOPLE.","Summary":"The people as a collective group are the ultimate source of political authority. Government action must be based directly on the collective wishes, needs, and desires of the people as a whole: the general will. Man starts out in an original state of nature, free but in a lawless environment, vulnerable to chaos and violence. To avoid this, people agree to give up some freedoms in return for the safety of political organization: the social contract.","Category":"Politics"},{"Book":"Why We Can't Wait","Author":"Martin Luther King","Description":"Martin Luther King Jr. had a dream of racial equality. Why We Can't Wait puts that dream into the context of three hundred years of American history, and acts as both a moral and practical guide to achieving it.","Question":"","Big Idea":"NONVIOLENT CIVIL DISOBEDIENCE IS THE BEST WAY TO GAIN EQUALITY.","Summary":"Add it to impassioned and reasoned debate, together with the biblical idea of loving your enemy, and you have the kind of \"soul force\" that can help African Americans finally gain the civil rights they deserve after \"three hundred years of humiliation, abuse, and deprivation.\" Racism is a disease that deeply penetrates both the white and the black psyche. The brave and defiant act of nonviolent mass protest will in itself provoke the kind of thinking that will eventually eliminate racism.","Category":"Politics"},{"Book":"China Rising: Peace, Power, and Order in East Asia","Author":"David C Kang","Description":"China Rising challenges the idea that China's ascent threatens the West. A strong China could foster peace, stability, and prosperity if the United States and its allies cooperate with China's rise, rather than confront it.","Question":"Why has China's rise been more peaceful than that of other great powers?","Big Idea":"THE RISE OF CHINA MAKES THE WORLD MORE STABLE. GLOBAL POWERS SHOULD COOPERATE WITH CHINA TO ACHIEVE ECONOMIC GROWTH AND GLOBAL PEACE.","Summary":"The mainstream belief in Western international relations that the rise of a new superpower inevitably causes intense competition and instability is not always true. Eastern Asian countries have largely welcomed China's rise toward superpower status, because they see China's success as beneficial to the whole region. US policies aimed at containing China's power are a missed opportunity to create a broader world order with a strong international partner.","Category":"Politics"},{"Book":"The Prison Notebooks","Author":"Antonio Gramsci","Description":"This seminal work of political philosophy is a vast collection of notes that details Gramsci's core concepts, including hegemony and state and civil society.","Question":"Do political states achieve dominance through cultural hegemony?","Big Idea":"THE POWERFUL IN CAPITALIST SOCIETIES GAIN AND KEEP THEIR POWER BY CONTROLLING BOTH THE ECONOMY AND THE CULTURE.","Summary":"A small group of people—the \"ruling class\"—is able to stay in power by convincing the majority of society that the way things are is the way things should be. The ruling class seeks to keep its grip on power by having massive influence over society's key political and civil institutions, from the courts to the schools. Marxist intellectuals must help the working classes organize themselves so they can resist, and ultimately transform, the societies in which they live.","Category":"Politics"},{"Book":"Theory of International Politics","Author":"Kenneth Waltz","Description":"Governments change. Regimes change. Even nations change. But we often see the same outcomes when nations engage with each other. Waltz's scientific, provocative analysis of the international system asks why.","Question":"What determines the ways in which the states behave in the international arena?","Big Idea":"ALL COUNTRIES HAVE SIMILAR FOREIGN POLICY GOALS—REGARDLESS OF IDEOLOGY.","Summary":"Capitalist or communist, democratic or dictatorial, it hardly matters when it comes to the foreign policy a country will adopt. That is the big idea that Kenneth Waltz brought to the study of international relations. Many experts and policy makers already believed that countries made foreign policy based not on moral principles, but on their own interests—above all their security. But Waltz took that idea one step further, claiming that scientific study showed it hardly mattered what kind of leadership a country had.","Category":"Politics"},{"Book":"A Theory of Justice","Author":"John Rawls","Description":"A provocative, influential work of political science exploring how we can create a just society where everyone enjoys not just equal rights, but also equality of opportunity.","Question":"How can a society ensure that it offers justice to its citizens?","Big Idea":"JUSTICE IS FAIRNESS, AND A JUST SOCIETY HAS RULES THAT OFFER BASIC LIBERTIES TO ALL CITIZENS.","Summary":"How can people make society better? Rawls says the answer lies in the principles of justice that underpin any given society. Get those right and the result is a stable, well-ordered community—one in which all individuals feel they are treated fairly. Through a process of reasoning, these principles are universal. In a fair society everyone enjoys equal rights and equality of opportunity.","Category":"Politics"},{"Book":"Democracy and Its Critics","Author":"Robert Dahl","Description":"A wide-ranging look at modern democratic theory by a great political thinker, offering standards by which we can test any country's level of democracy, while also proposing ways to improve democracy in the future.","Question":"What are the limits to democracy?","Big Idea":"DEMOCRACY IS THE MOST DESIRABLE POLITICAL SYSTEM—DESPITE ITS IMPERFECTIONS.","Summary":"It is justified by its most basic principle, that the interests of each person in a political community must be given equal consideration. The idea of democracy is now almost universally popular, but some regimes that claim to be democratic do not, in truth, practice democracy. Dahl creates a set of standards by which we can decide whether a country really is democratic.","Category":"Politics"},{"Book":"The Republic","Author":"Plato","Description":"The Republic is one of the first Western works of political philosophy, exploring the relationship between the individual, the state, different forms of government, and the nature of justice.","Question":"What would an ideal state look like – and how would it work?","Big Idea":"HOW CAN WE DEFINE JUSTICE? BY EXAMINING THE MORAL CHARACTER OF THE INDIVIDUAL AND THE STATE—AND THE RELATIONSHIP BETWEEN THEM.","Summary":"The Republic tries to determine what it means for an individual and a city-state to be just. Plato tries to connect theories of morality with different forms of political structure. By means of an extended dialogue, different political arrangements are imagined by drawing on existing theories of justice and developing new ones. The central claim is that the moral characteristics of the just citizen are reflected in the characteristics of the just state.","Category":"Politics"},{"Book":"Leviathan","Author":"Thomas Hobbes","Description":"Does a king have a divine right to rule? Or is his position only valid if he acknowledges his responsibilities to the people? Thomas Hobbes investigates the political theory of \"the social contract.\"","Question":"What does it mean to be truly free? Is it living in a world where you are able to go about your life as you wish, without oppression or tyranny from others?","Big Idea":"A SOCIAL CONTRACT EXISTS BETWEEN A RULER AND THE RULED.","Summary":"Where do kings and queens get their authority to rule? Hobbes argues that strong government, with a sovereign at its head, is the most rational choice if we are to have an ordered society. But it is important that those who rule take their obligations to the people seriously. Kings do not have a divine right to hold power. Their position is only earned through an undertaking to protect the people they rule over.","Category":"Politics"},{"Book":"The End of History and The Last Man","Author":"Francis Fukuyama","Description":"Fukuyama agues that the triumph of Western-style capitalism and liberal democracy means the continual process of change that we call \"history\" is now over.","Question":"Does the end of history mean the end of events?","Big Idea":"CAPITALIST DEMOCRACY IS THE FINAL DESTINATION FOR ALL SOCIETIES.","Summary":"This is inevitable, because it is the only system that satisfies our yearning for equality. The story of human history is of an unfolding quest to be free and equal. Ideas evolve logically over the ages until every society arrives at the same destination: capitalist democracy. The inevitable march of liberal democracy across the world marks the endpoint of history.","Category":"Politics"},{"Book":"A Disquisition on Government","Author":"John C. Calhoun","Description":"\"How can government be structured to protect the rights of minorities?\" asks Calhoun in this key work in American politics.","Question":"What is the best way to ensure that we do not fall prey to the \"tyranny of the majority\"?","Big Idea":"MAJORITY RULE LEADS TO THE ABUSE OF POWER.","Summary":"American politician John C. Calhoun saw danger signs in democracy, since people run governments, and people are naturally self-interested. He was concerned that simple majority rule was open to abuse and that \"the tyranny of the majority\" would become a huge problem as elected leaders could promote their own interests. He proposed a system he called \"the concurrent majority,\" where minority groups would be able to veto central government legislation that worked against their interests.","Category":"Politics"},{"Book":"Who Governs? Democracy and Power in an American City","Author":"Robert Dahl","Description":"American democracy is a system in which different groups compete for political influence. It is not a system where a small number of people control everything simply because they are wealthy and well connected.","Question":"Where can we find the \"location of power\"?","Big Idea":"AMERICAN DEMOCRACY IS PLURALIST. IT IS A POLITICAL SYSTEM IN WHICH DIFFERENT COMPETING INTEREST GROUPS JOCKEY FOR POWER AND SHAPE POLICY-MAKING.","Summary":"Who Governs? (1961) offers a clear response to elitist theorists, who had previously argued that American politics was dominated by a small number of people who controlled political decision-making through their wealth and influence. It puts forward a definition of political power as the ability to make others do what you want them to, and concludes that, while most people do not actively participate in politics, power is still fragmented, and citizens indirectly shape decision-making.","Category":"Politics"},{"Book":"Utilitarianism","Author":"John Stuart Mill","Description":"Happiness is the goal of human life, says John Stuart Mill. So an action is morally good to the extent that it promotes the greatest amount of happiness among all people.","Question":"Does the end justify the means?","Big Idea":"WHAT IS THE GOAL OF HUMAN LIFE? AND WHAT IS THE MORALLY CORRECT WAY TO ACT?","Summary":"We all wonder sometimes how we should act. John Stuart Mill argues that the goal of all human life is happiness, and that the right thing to do is the thing that brings about the most happiness and the least unhappiness for all people. An action can only be considered \"right\" if it promotes the greatest amount of human happiness. Some argue that this principle conflicts with our sense of justice, but Mill insists that justice, too, is based on this principle.","Category":"Politics"},{"Book":"Politics","Author":"Aristotle","Description":"What shape should our political institutions take if they are to serve every section of society? Aristotle's Politics is a classic work on governance at the birth of modern political philosophy.","Question":"What role should the political community and politics play in enabling society to live virtuously?","Big Idea":"MAN IS BY NATURE A POLITICAL ANIMAL. STATES HELP US TO LIVE \"THE GOOD LIFE.\"","Summary":"Living in a politically organized community with other citizens sharing similar goals makes us happier, because it helps us to become better human beings—more fair, more just, more generous. And if humans form political groups to become better human beings, the role of the state should be to support this endeavor by passing judicious laws and creating a good constitution.","Category":"Politics"},{"Book":"The Rights of Man","Author":"Thomas Paine","Description":"Citizens have the right to create new governments when governments ignore the rights of citizens. Paine's ideas about democracy and liberty are still important today.","Question":"What makes a government legitimate? And who has the right to lead?","Big Idea":"PEOPLE SHOULD REVOLT IF THEIR RIGHTS ARE NOT DEFENDED.","Summary":"After the American and French revolutions of the late 1700s, many political thinkers argued that such upheavals were dangerous. Paine staunchly disagreed. He writes that both revolutions were the result of corrupt and abusive ruling monarchies that were responsible for the inequalities of society. Paine mounts a passionate defense of governments based on representative democracy with an elected head of state.","Category":"Politics"},{"Book":"On Liberty","Author":"John Stuart Mill","Description":"Mill defines liberty as a primary force for social progress and individual well-being in a work considered one of the most important texts in political philosophy.","Question":"Where does liberty begin and end - and what limits to freedom should people accept in society and why?","Big Idea":"GUARANTEE LIBERTY AND YOU GUARANTEE PROGRESS. SO HOW MUCH SHOULD THE STATE INTERVENE TO ENSURE SOCIAL JUSTICE?","Summary":"Liberty, says Mill, is freedom of speech and freedom of action. Allow the individual to flourish, and society is the winner. According to him, the state should only interfere in your liberty if your actions are causing harm to someone else. We must, however, guard against \"the tyranny of the majority\"—when the freedom of the minority is threatened by the sheer weight of popular opinion.","Category":"Politics"},{"Book":"Common Sense","Author":"Thomas Paine","Description":"An American war with the British Empire is perfectly sensible—and morally justified—argues Thomas Paine in this 1776 pamphlet. This text galvanized Americans to grasp independence by managing to convince them that the war was both winnable and just.","Question":"","Big Idea":"THE RULE OF MONARCHS IS UNJUST, AS IS AN ISLAND NATION RULING A CONTINENT.","Summary":"Common Sense calls for the American colonies of the late eighteenth century to rise up against Great Britain and demand independence. Theoretically, it argues for individual rights and liberty, and attacks the idea of hereditary monarchies as absurd. Practically, it argues that British rule is tyrannical. Most importantly, it creates a persuasive argument of America's ability to achieve independence from Britain by military means.","Category":"Politics"},{"Book":"The Prince","Author":"Niccolò Machiavelli","Description":"Power. How to attain it? How to retain it? \"By any means necessary,\" insists Machiavelli in this vastly influential text—still politically relevant 500 years after its publication.","Question":"","Big Idea":"EFFECTIVE RULERS MUST BE RUTHLESS, WHILE APPEARING TO BE MORAL.","Summary":"Statesmen like to claim they are motivated by moral codes and by doing good. Machiavelli was the first thinker to argue openly that political survival depends far more on strength than morality. Only men who are decisive and ruthless in pursuit of their own ends can protect themselves—and therefore their countries. Machiavelli exposed the hypocrisy of leaders who present themselves as acting only for the greater good when their true motives are far more self-serving.","Category":"Politics"},{"Book":"Theology of Discontent","Author":"Hamid Dabashi","Description":"A study of the eight Islamic thinkers without whom the Iranian Revolution of 1978–9 might never have happened, and a dissection of how post-revolutionary Iran defined itself as \"Iranian.\"","Question":"The Iranian Islamic Revolution of 1979 was a seminal event in political, religious and cultural terms, for both the Middle East and the world as a whole. But why did it take place?","Big Idea":"EIGHT ISLAMIC THINKERS SHAPED THE IRANIAN REVOLUTION.","Summary":"Iran's revolution of 1978–9 saw the head of state, Shah Mohammad Reza Pahlavi, overthrown and replaced by Ayatollah Ruhollah Khomeini, the leader of an Islamic republic. It would not have happened without the ideology developed by eight prominent Iranian Islamic thinkers in the decades prior to the revolution.","Category":"Politics"},{"Book":"Politics Among Nations, The Struggle for Power and Peace","Author":"Hans Morgenthau","Description":"The text that first defined political \"realism\" in international relations: the idea that state behavior is driven by a self-interested desire to accumulate power.","Question":"How does the balance of power play out between countries?","Big Idea":"THE NATIONAL INTEREST IS DEFINED AS POWER. STATES WANT NATIONAL SECURITY; POWER SECURES THIS.","Summary":"Politics Among Nations introduces the \"realist\" theory of international relations. This is based on the idea that all states are primarily driven by the desire to accumulate power, relative to other states. If a state has the power to dominate another state—even by a small amount—then the dominant state's security is guaranteed in a system that has no central authority.","Category":"Politics"},{"Book":"After Hegemony","Author":"Robert Keohane","Description":"Cooperation between nations can happen without the influence of a dominant power, or hegemon, says Keohane, as he makes the case for the neoliberal school of international relations.","Question":"Could the countries of the world live in collaboration without the presence of one dominant world state?","Big Idea":"A DOMINANT POWER IS NOT NECESSARY FOR NATIONS TO COOPERATE.","Summary":"International relations had traditionally been defined by competition and self-interest. Political thinkers believed that it was impossible for nations to work together without the influence of a hegemon—a dominant international power—to act as both referee and ultimate decision-maker. Keohane turns this idea on its head, persuading us of the value of his neoliberal theory. Nations will join a cooperative international \"regime,\" he argues, because they realize that it is in their interests to do so.","Category":"Politics"},{"Book":"The Federalist Papers","Author":"Alexander Hamilton, James Madison & John Jay","Description":"One of the founding documents of the American nation, this text advocated replacing the Articles of Confederation with a Constitution and today serves as an important point of reference for American government and law.","Question":"How should a new democracy establish effective government?","Big Idea":"A STRONG FEDERAL GOVERNMENT IS ESSENTIAL.","Summary":"It is vital for political and economic stability and, if controlled, will not trample minority rights, nor curb individual freedoms. The loose confederation of states that formed the United States in the late eighteenth century was wary of overly strong—and often remote—central government. These essays argue for a strong and active central US government, bound by checks and balances enshrined in a constitution designed to protect individual liberty.","Category":"Politics"},{"Book":"Capital","Author":"Karl Marx","Description":"What is capitalism? How is it failing those of us whose labor keeps it going? And what might come afterwards? In this economic analysis that changed the lives of millions, Marx's answer to this last question is \"communism.\"","Question":"How does capitalist society work?","Big Idea":"CAPITALISM WORKS BY EXPLOITING THE WORKING CLASS. THEIR WAGES DO NOT REFLECT THE VALUE OF THEIR LABOR.","Summary":"Karl Marx said that capitalism would fail because there is a fundamental contradiction at the heart of this economic system. Capitalists exploit the working class, but are also wholly reliant on them. Capitalists manipulate the workers, because the wages the workers are paid do not reflect the value of the labor they do. As a result, in a capitalist system the profits are diverted to the few, rather than being shared equally throughout society by the many.","Category":"Politics"},{"Book":"Reflections on the Revolution in France","Author":"Edmund Burke","Description":"A fiery response to radical political change in eighteenth century Europe, a conservative counterblast against democracy, and the case for England's traditional political institutions.","Question":"","Big Idea":"RADICAL BELIEFS WILL CAUSE SOCIETY TO DISINTEGRATE—NO MATTER HOW RATIONAL THEY MIGHT SEEM.","Summary":"Is it a good idea to rip up society's rulebook and start again? No, says eighteenth-century politician Burke. Society is too complex and too important to be driven by unproven ideas alone. Writing while the French Revolution was in full effect, Burke was terrified that Britain might also be seduced by \"people power.\" He was convinced it would lead to chaos and violence. Don't believe a perfect state can simply be created, he warns. Modify the systems that have stood the test of time. Evolution, not revolution.","Category":"Politics"},{"Book":"The Art of War","Author":"Sun Tzu","Description":"A Chinese text on military strategy that is over 2,500 years old, yet still revered today. According to Sun Tzu planning, strategy, access to information, and rationality are key building blocks to ensuring success in war.","Question":"","Big Idea":"THE BEST WAR IS WON WITHOUT FIGHTING.","Summary":"Chinese military general Sun Tzu (544–496 b.c.e.) offers one of the most comprehensive guides to war ever written. Sun Tzu doesn't concentrate on what happens on the battlefield, nor does he measure success by a simple body count. Rather he focuses on the need for meticulous preparation to ensure success, insisting that combat is only one part of a coherent strategy for victory. Planning, diplomacy and, above all, intelligence-gathering are vital if war is to be waged intelligently—and successfully.","Category":"Politics"},{"Book":"The Clash of Civilizations","Author":"Samuel Huntington","Description":"A vision of a post-Cold War world that is shaped by cultural conflict, especially between the Islamic world and the West, Huntington's text has greatly influenced US foreign policy debate.","Question":"Culture and ideology shape our relationships – both define who we choose to associate with. But which has more influence? Cultural factors such as language, customs and societal rules? Or ideological ones such as politics or philosophy?","Big Idea":"FUTURE CONFLICT WILL BE BETWEEN CULTURES, NOT IDEOLOGIES.","Summary":"The end of the Cold War in 1991 ushered in a new era where nations would choose their friends and name their enemies along cultural lines, not ideological ones. The balance of power would shift away from Soviet communism versus United States-style democracy. Instead, emotional loyalties and obligations would determine the outcome of global struggles.","Category":"Politics"},{"Book":"Democracy In America","Author":"Alexis De Tocqueville","Description":"Tocqueville sees early-nineteenth-century America as democracy done right, so travels the length and breadth of the country to see how they achieved it, before exporting his learnings back to his native France.","Question":"What are the key elements of a successful democracy?","Big Idea":"HEALTHY DEMOCRACIES HAVE TO LIMIT GOVERNMENT CONTROL.","Summary":"Many nineteenth-century political thinkers feared the emerging democratic system of government would lead to anarchy. But Tocqueville disagreed. He insisted that the greatest danger in democratic rule was that it could lead to the growth of a despotic, centralized state. And an increase in state power would result in a decrease of individual initiative and responsibility, eventually leading to overall social decline.","Category":"Politics"},{"Book":"Bowling Alone","Author":"Robert Putnam","Description":"Connected, engaged communities generate \"social capital,\" to the benefit of society. What is it, exactly—and can we encourage it?","Question":"Is the glue that holds society together coming unstuck? And if so, who or what's to blame?","Big Idea":"IF AMERICA IS TO THRIVE, ITS CITIZENS MUST CONNECT. SOCIAL CAPITAL—THE CIVIC VALUES THAT UNDERPIN COMMUNITY—IS THE GREASE THAT OILS THE WHEELS OF SOCIETY.","Summary":"Putnam didn't invent the idea of social capital, but gave it a radically new perspective, looking beyond families to people's broader engagement with their communities. Fewer people then ever before are volunteering and joining clubs. But why does that matter? Because increased social capital improves life in big ways—boosting health and lowering unemployment.","Category":"Politics"},{"Book":"Aggression, A Social Learning Analysis","Author":"Albert Bandura","Description":"Aggression is a learned behavior, and it develops early in life. This can be demonstrated in experiments, disproving theories that see it as an uncontrollable part of human society. Aggression can not only be controlled, but also reduced.","Question":"What do we learn socially?","Big Idea":"AGGRESSION IS A BEHAVIOR THAT IS LEARNED, AND IT DEVELOPS EARLY IN LIFE.","Summary":"Our behavior is not just a simple, automatic response to environmental cues. Behavior is, in fact, affected by cognition—the process of acquiring knowledge and understanding by means of experience, thought, and the senses. Human behavior is learned through three main processes: imitation, observation, and modeling. Imitation means learning by copying someone else's behavior. Observation means learning by watching another's behavior. Modeling means using the actions of another as an example of how to form new behaviors.","Category":"Psychology"},{"Book":"The Better Angels of Our Nature: Why Violence Has Declined","Author":"Steven Pinker","Description":"Over the last 100 years we've lived through world war, genocide, and rebellion. Life seems more violent than ever. But violence is actually declining. Democracy, economic exchange, and cosmopolitanism have made us more peaceful.","Question":"Is society becoming more peaceful?","Big Idea":"OVER TIME, HUMANITY HAS BECOME LESS VIOLENT.","Summary":"Media images of violence and destruction make us think the world is a violent and threatening place. But don't let the headlines fool you. Over the centuries, human violence has actually been in decline. Statistical evidence shows that we are far less likely to die a violent death today than we were in earlier centuries. While humanity has a biological tendency to be violent, social forces can help dampen those urges.","Category":"Psychology"},{"Book":"Judgment under Uncertainty: Heuristics and Biases","Author":"Amos Tversky & Daniel Kahneman","Description":"A fascinating paper that tries to explain human behavior by examining how we make decisions. The brain makes many of those decisions automatically, without any input from our conscious mind.","Question":"Can mental shortcuts cause inaccurate decision making?","Big Idea":"THE DECISIONS WE MAKE ARE NOT ALWAYS RATIONAL.","Summary":"We like to think we know why we make the decisions we do. But that's not always true, because we often make decisions at a subconscious level. Our brains use \"cognitive short-cuts\" or \"rules of thumb\" to process information. These short-c
