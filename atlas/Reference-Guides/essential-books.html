uts help us make decisions quickly, saving time and energy. Sometimes they help us to make the right decision, but in other situations they lead us astray. Understanding the brain's cognitive short-cuts helps us to predict errors in human decision-making.","Category":"Psychology"},{"Book":"The Bell Curve: Intelligence and Class Structure in American Life","Author":"Richard J. Hernstein & Charles Murray","Description":"This highly provocative book argues that social inequality cannot be tackled by providing greater opportunities or support to disadvantaged groups. People succeed or fail depending on how intelligent they are—and intelligence is genetically determined.","Question":"Are people's life outcomes mainly determined by their intelligence?","Big Idea":"INEQUALITY IS WRITTEN IN OUR GENES.","Summary":"Why are some people successful, while others seem condemned to live impoverished lives? For Herrnstein and Murray, the answer lies in our genes. Our genes determine how intelligent we are, and our intelligence determines our potential for success. Through mechanisms like college admission and university rankings, society shunts the \"cognitive elite\" into positions of power and prestige. They gain wealth and social status, while those at the other end of the spectrum have limited opportunities and limited wealth.","Category":"Psychology"},{"Book":"A General Theory of Crime","Author":"Michael Gottfredson & Travis Hirschi","Description":"An important work of criminal psychology claiming that people with low levels of self-control are more likely to commit crimes than people with normal or high levels. To prevent crime we must understand how people develop and maintain their self-control.","Question":"What makes people more likely to commit crime?","Big Idea":"PEOPLE WITH LOW LEVELS OF SELF-CONTROL ARE MORE LIKELY TO COMMIT CRIMES.","Summary":"This means criminologists can look at measures of self-control in a person and predict how likely he or she is to commit a crime. Self-control is a characteristic that forms early in a person's life, and it is heavily influenced by a child's relationship with his or her parent. A person's level of self-control remains fairly stable after it is formed, meaning all types of crime can be explained in this way.","Category":"Psychology"},{"Book":"The Interpretation of Dreams","Author":"Sigmund Freud","Description":"Our dreams give us an insight into our unconscious minds. This idea—commonplace today—is one of the most famous and influential theories about the mind ever put forward, and fired a revolution in psychiatry at the end of the nineteenth century.","Question":"What significance do the contents of our dreams play in understanding our own psyche?","Big Idea":"DREAMS REVEAL OUR UNCONSCIOUS DESIRES.","Summary":"The unconscious mind transforms wishes into dreams if those wishes are too uncomfortable to acknowledge in an uncensored form. Our conscious minds censor these wishes in some way, so they only become apparent in our dreams. To understand the message, it is important to analyze and interpret the dream. An innovative way of interpreting dreams is through \"free association,\" where one person (the therapist) says a word and the other (the patient) responds immediately with another word.","Category":"Psychology"},{"Book":"The Lucifer Effect: Understanding How Good People Turn Evil","Author":"Philip Zimbardo","Description":"Any one of us is capable of sadism and evil if we are placed in certain psychologically challenging situations. A dangerous combination of \"situational forces\" and social pressures can make most normal, good people quickly transform into evildoers.","Question":"What makes humans capable of evil acts?","Big Idea":"YOU DON'T NEED TO BE EVIL TO COMMIT EVIL. ALL IT TAKES IS TO BE IN THE WRONG PLACE AT THE WRONG TIME.","Summary":"Sometimes people don't commit evil because they are inherently bad. Sometimes good people do evil things simply because of the bad situation they find themselves in. Why? Because certain situations contain such powerful psychological pressures to do wrong that most people just can't resist. Stress, new surroundings, and peer pressure in a newly formed group can all contribute to a system that fosters bad behavior. So it is typically \"bad barrels\" rather than \"bad apples\" that cause these unpalatable human responses.","Category":"Psychology"},{"Book":"Obedience to Authority","Author":"Stanley Milgram","Description":"An important psychological work claiming that many people are susceptible to obeying authority figures, regardless of the inhumane acts they are asked to carry out, or the order going against a personal moral code.","Question":"How far are ordinary people willing to go – when they are ordered to by people in authority?","Big Idea":"ORDINARY PEOPLE TEND TO OBEY THOSE IN AUTHORITY.","Summary":"Many people who exhibit no disturbing psychological tendencies are still capable of acting in a cruel and inhumane way if ordered to do so by authority figures. That this behavior may well go against their personal moral codes seems to make little difference. This kind of compliant behavior is clearly seen in the massacring of Jews under the Nazi regime in Germany in the 1930s and 1940s. It is, in fact, a basic aspect of human nature.","Category":"Psychology"},{"Book":"Nudge: Improving Decisions About Health, Wealth, and Happiness","Author":"Richard H. Thaler & Cass R. Sunstein","Description":"A highly influential work promoting a philosophy of government intervention known as \"libertarian paternalism,\" which argues that governments should \"nudge\" their citizens towards making better decisions while always respecting their freedom to choose.","Question":"","Big Idea":"GOVERNMENTS CAN HELP CITIZENS MAKE BETTER CHOICES, WITHOUT RESTRICTING THEIR FREEDOM OF CHOICE.","Summary":"Are tougher rules and heavier punishments the only way to get people to make better choices in life? Thaler and Sunstein say that in many cases there is a better way. Governments can \"nudge\" citizens towards making better choices by changing the environment in which people make decisions. We can promote better eating by placing healthier foods like vegetables first in a cafeteria line of options. We can encourage employees to participate in a retirement savings plan by automatically enrolling them.","Category":"Psychology"},{"Book":"The Man Who Mistook His Wife for a Hat and Other Clinical Tales","Author":"Oliver Sack","Description":"Neurology patients are not just medical specimens. They are people with fascinating, insightful stories about their experiences and struggles. This work introduces 24 case studies that focused the general public on neurological disorders for the first time.","Question":"How can sensitivity to neurological disorders be raised amongst the general populist?","Big Idea":"IF DOCTORS CONNECT WITH PATIENTS, HEALTH CARE IMPROVES.","Summary":"Patients are real people struggling to cope with serious problems. Medical doctors, and neurologists in particular, need to pay more attention to the individual stories and struggles of these patients. Neurology has adopted a mechanical and impersonal approach to patient care, and this hurts not only patients, but practitioners as well. When doctors embrace the individual experiences of patients, they gain valuable insights into improving treatment strategies.","Category":"Psychology"},{"Book":"The True Believer: Thoughts on the Nature of Mass Movements","Author":"Eric Hoffer","Description":"How do people get so caught up in a cause that they would die for it? Written in the aftermath of World War II, this analysis of fundamentalism remains remarkably relevant in the modern age of terrorism.","Question":"Why do people join mass movements?","Big Idea":"FUNDAMENTALISTS ARE ESSENTIALLY ALL ALIKE.","Summary":"No matter what causes they believe in, and whether their goals are peaceful or violent, all mass movements attract the same kind of supporters. People become radicalized not by ideas, but by difficult economic conditions and the loss of self-worth. They have become frustrated with their own situations, have lost all faith in themselves, and no longer value their individual identity. Mass movements step in to fill this void.","Category":"Psychology"},{"Book":"The Feminine Mystique","Author":"Betty Friedan","Description":"American women in the 1950s were encouraged to be housewives while their husbands worked, but these gender roles created a damaging unease. The answer to this problem was for women to be freed to pursue education and work, for the good of everybody.","Question":"Why were women in mid 20th century America dissatisfied with their lives?","Big Idea":"IT IS NOT TRUE THAT A WOMAN'S NATURAL ROLE IS TO BE A HOUSEWIFE. IN FACT, IT CAN MAKE THEM MISERABLE.","Summary":"The path mapped out for women in American society after World War II left them feeling deeply uneasy. Total devotion to house, husband, and children was presented as being of equal value to a man's role as breadwinner. But the pressure from society to turn away from education and work in favor of domestic life closed down women's chances of developing as individuals. Ensuring women have the same opportunities for growth as men will make whole families healthier and happier.","Category":"Psychology"},{"Book":"Eyewitness Testimony","Author":"Elizabeth F Loftus","Description":"A groundbreaking work of psychology saying police and attorneys should gather and use eyewitness testimony in ways that do not compromise its reliability. It also suggests that in criminal trials that rely on eyewitness accounts, psychologists should be able to testify about problems with memory.","Question":"Can we really rely on our memories to give us a true account of past events?","Big Idea":"EYEWITNESS TESTIMONY CAN BE UNRELIABLE IN COURT, BECAUSE HUMAN MEMORY IS NOT PERFECT","Summary":"Eyewitness testimonies are an extremely important part of any court case. So if we can't rely on what people think they saw, then the entire criminal justice system is potentially flawed. To avoid unsound convictions, eyewitness testimony should be gathered and used in ways that make it more reliable. And psychologists should be able to testify in court about problems they can see with eyewitness accounts.","Category":"Psychology"},{"Book":"A Theory Of Human Motivation","Author":"Abraham H. Maslow","Description":"Presents a five-stage pyramidical hierarchical model of motivational needs from basic to safety to love to esteem to self-actualization","Question":"As humans, do we have universal human needs?","Big Idea":"HUMAN BEHAVIOR IS DRIVEN BY A \"HIERARCHY OF NEEDS.\"","Summary":"All humans have untapped potential and are constantly trying to attain excellence. But what powers our human motivation? It is an innate requirement to satisfy our needs, starting with the most urgent first. Most pressing are physiological needs, those things fundamental for the normal functioning of life, like food and water. Next come safety needs, such as shelter and order, followed by love, esteem, and finally self-actualization—the fulfillment of a human's potential.","Category":"Psychology"},{"Book":"The Principles Of Psychology","Author":"William James","Description":"How do our thoughts interact with our minds? Is there a scientific way to answer that question? A landmark work that helped validate psychology as a science and now forms part of the current debate on artificial intelligence.","Question":"","Big Idea":"","Summary":"","Category":"Psychology"},{"Book":"A Theory of Cognitive Dissonance","Author":"Leon Festinger","Description":"Holding contradictory beliefs makes us uncomfortable. It is often truth and logic that are the losers when we try to make the discomfort go away.","Question":"","Big Idea":"PEOPLE LIKE THEIR BELIEFS AND BEHAVIORS TO BE CONSISTENT. WHEN THEY ARE INCONSISTENT, THEY FEEL UNCOMFORTABLE.","Summary":"Our ideas and beliefs are often contradictory: we smoke when we know smoking is bad for our health; we want to lose weight, but eat foods we know are fattening. So we try to rationalize these behaviors. However, this inconsistent thinking creates a difficult psychological state known as \"cognitive dissonance.\" To lead lives that are consistent and meaningful, we attempt to reduce the discomfort this causes, either by changing our behavior or by looking to change our views on the issues involved.","Category":"Psychology"},{"Book":"Working Memory","Author":"Alan Baddeley & Graham Hitch","Description":"Our short-term memory has a vital task besides simply storing information: it works to help us make sense of the world.","Question":"How does our short term memory work?","Big Idea":"SHORT-TERM MEMORY ISN'T JUST A FILING CABINET—IT ACTUALLY DOES WORK TOO.","Summary":"In the 1950s and 1960s there were conflicting ideas in the world of cognitive psychology about the nature of short- and long-term memory. Psychologists started to understand that short-term memory was not, in fact, passive—rather it actively played a role in understanding. Baddeley and Hitch developed a series of experiments to prove that this memory store really was \"working.\" They concluded that working memory had three elements: two memory stores (one each for visual and audio information) and a central controller to process the information.","Category":"Psychology"},{"Book":"The Nature of Prejudice","Author":"Gordon Allport","Description":"Contact between different groups of people reduces prejudice. So says Allport in this analysis of the psychology of prejudice that helped shape both US society and government policy.","Question":"How do we form perceptions and opinions about the people around us – whether right or wrong?","Big Idea":"PREJUDICE IS EVERYWHERE, BUT IT CAN BE COMBATTED.","Summary":"All human beings are capable of prejudice. Gaining an understanding of prejudice and why it exists will help society to take action to reduce it. The commonly held view in 1954 was that prejudice was down to environmental factors, but Allport disagreed. He said prejudice did not have a single cause; it was the result of cognitive processes, or established patterns of thinking and belief. And the best way to overcome it was by establishing contact between different groups.","Category":"Psychology"},{"Book":"The Protestant Ethic and the Spirit of Capitalism","Author":"Max Weber","Description":"An important early text in the field of sociology, arguing that attitudes fostered by different religious sects helped shape capitalism into the force we know today.","Question":"Is Protestant Christianity the cause of modern capitalism?","Big Idea":"THE MORAL CODES OF PROTESTANT RELIGIONS SHAPED THE DEVELOPMENT OF CAPITALISM.","Summary":"Why do two nearly identical groups adopt different economic behaviors? The answer is in their religions: while Catholics believed that all faithful people could attain salvation, some Protestant sects taught that God had predetermined who would and wouldn't be saved. This meant that these particular Christians worked harder than their Catholic countrymen—seeing it as the only way to prove their worthiness. And all this hard work led them to amass more wealth. The Protestant work ethic therefore helped capitalism to develop and flourish.","Category":"Sociology"},{"Book":"The Lonely Crowd: A Study of the Changing American Character","Author":"David Reisman","Description":"The Lonely Crowd is a sociological argument that says the character of the United States' citizens changed dramatically post-World War II. Adjusting to the emerging consumer society, for the first time Americans began looking to their peers and the mass media to guide their behavior.","Question":"How is American middle class society changing?","Big Idea":"AS TIMES CHANGE, INDIVIDUAL CHARACTER CHANGES TOO.","Summary":"With changes in society's social and economic structures come changes in the way people behave and understand themselves. When societies are expanding (as had been the historical situation in America,) \"inner-directed\" individuals flourish, acting according to their own internal set of values and beliefs. But postwar America, with its consumer-driven society, creates \"other-directed\" individuals who are more influenced by external forces and the prevalent culture. Now it is the views of peer groups and the mass media that are all-important.","Category":"Sociology"},{"Book":"Revolution and Rebellion in the Early Modern World","Author":"Jack A. Goldstone","Description":"Challenging Marxist theories of early modern revolutions, Goldstone argues that revolutions in both Europe and Asia between 1500 and 1800 had the same root causes.","Question":"Why do revolutions happen?","Big Idea":"EUROPE AND ASIA SHARED THE SAME CATALYSTS FOR REVOLUTIONS OVER THREE CENTURIES. AND THOSE SAME TRIGGERS CAN SPARK REBELLIONS TODAY.","Summary":"There were four core causes of the revolutions and rebellions in Europe and Asia between 1500 and 1800: state breakdown, fiscal crisis, intra-elite conflict, and mass-mobilization potential. Population growth, bad weather, and disease all placed constraints on centralized states' ability to raise revenue. Fiscal crises followed, along with the rise of discontented elites who were excluded from the heart of the state system. These elites mobilized the masses—likewise unhappy because of their own material hardship—and revolt followed.","Category":"Sociology"},{"Book":"The Sociological Imagination","Author":"C. Wright Mills","Description":"A combative work that calls on social scientists to reach beyond their comfort zones and strive to interpret people's problems within both the context of history and the institutions of society. Sociology, says Mills, should turn the troubles of individuals into public issues.","Question":"How do societal structures affect our life experiences?","Big Idea":"","Summary":"","Category":"Sociology"},{"Book":"The New Jim Crow: Mass Incarceration in the Age of Colorblindness","Author":"Michelle Alexander","Description":"A hard-hitting work claiming racial segregation is alive and well in modern America. The mass imprisonment of blacks there today works in the same way as the Jim Crow segregation that blacks suffered from the late nineteenth century through the 1960s.","Question":"Do African Americans still suffer from systemic discrimination?","Big Idea":"AMERICAN SOCIETY HAS FOUND A NEW WAY TO SEGREGATE AFRICAN AMERICANS—JAIL.","Summary":"America became officially colorblind in the 1960s after ending the Jim Crow segregation that once dominated the American South. Yet decades after the Civil Rights Movement, discrimination is again in full effect with a new racial caste system operating in \"mass incarceration.\" Brought to prominence in 1982 under US President Ronald Reagan, the \"war on drugs\" targeted and imprisoned blacks in disproportionate numbers. The number of African Americans in prison or jail, probation, or parole, is now greater than the number of slaves back in 1850.","Category":"Sociology"},{"Book":"States and Social Revolutions: A Comparative Analysis of France, Russia, and China","Author":"Theda Skocpol","Description":"A methodical look at the general circumstances that must exist for revolutions to be possible.","Question":"What changes when a social revolution occurs?","Big Idea":"REVOLUTIONS CAN HAPPEN WHEN CERTAIN CONDITIONS COMBINE TO DISRUPT STATE POWER.","Summary":"They do not happen simply because people decide to revolt. If that were true, then all who are excluded from society would start a revolution. Yet often they do not. Particular circumstances must exist before revolution can spring up. Countries need to be agrarian, with a way of life based on farming. Power must be centralized, but the country must be rife with antiquated strategies for rule. And a military threat from abroad must force these countries to modernize rapidly.","Category":"Sociology"},{"Book":"Homeward Bound: American Families in the Cold War Era","Author":"Elaine Tyler May","Description":"Argues that Cold War anxieties about the Atomic Age influenced all facets of American life, both public and private.","Question":"How did the Cold War affect America's idea of traditional family values?","Big Idea":"POLITICAL POLICIES INFLUENCED DOMESTIC CULTURE IN 1950S AMERICA.","Summary":"In the 1950s, US politicians pursued a policy of \"containment\" to stop the global spread of communism. But the atmosphere created by that policy filtered into the domestic arena as the culture tried to enforce standards that reflected \"The American Way.\" The media helped to enforce these norms of stay-at-home moms raising children in their perfectly equipped suburban homes. The 1950s American home was, in fact, where public policy and private behavior met.","Category":"Sociology"},{"Book":"The Death and Life of Great American Cities","Author":"Jane Jacobs","Description":"A condemnation of post–World War II city planning, which often favored the efficient movement of cars over the well-being of people. The book highlights the failures of urban renewal projects and offers an alternative vision of what really makes a city great—its people, its buildings, and its diversity.","Question":"Do new urban policies forget the importance of variety and integration when planning to expand a city?","Big Idea":"URBAN PLANNERS RUIN GREAT CITIES. THEY DO NOT UNDERSTAND THAT IT IS A CITY'S SOCIAL INTERACTION THAT MAKES IT GREAT.","Summary":"Proposals and policies that are drawn from planning theory do not consider the social dynamics of city life. A truly visionary approach to urban planning should incorporate spaces with mixed uses, together with short, walkable blocks, large concentrations of people, and a mix of new and old buildings. This creates true urban vitality.","Category":"Sociology"},{"Book":"The History of Sexuality","Author":"Michel Foucault","Description":"The first of three volumes investigating the link between sexuality, sexual repression and identity in the western from the 17th to the 20th century.","Question":"How has our interpretation of sexuality been shaped by historical trends?","Big Idea":"TALK ABOUT SEX WAS NOT AVOIDED BEFORE THE 1960S SEXUAL REVOLUTION.","Summary":"Even in the supposedly highly repressive nineteenth century, sex was discussed a lot. The Victorians may have tried not to talk about it, but they failed, as sex became an important part of scientific study. This research led to the creation of new categories for \"normal\" or \"deviant\" sex. By labeling sexual activities in this way, the authorities were seeking to control yet another part of their citizens' lives.","Category":"Sociology"},{"Book":"The Wretched of the Earth","Author":"Frantz Fanon","Description":"A powerful work claiming colonizers achieve power through violence, and so must be overcome with violence if necessary. There can be no compromise. The colonized must rid themselves of everything \"colonial\" and forcefully assert their own identity.","Question":"Was violence justified in overthrowing colonial oppression?","Big Idea":"VIOLENCE IS NECESSARY TO DESTROY COLONIALISM. THE COLONIZED MUST REGAIN THEIR SENSE OF SELF-WORTH.","Summary":"Violent uprising can truly destroy colonialism and help the colonized overcome the psychological damage it has caused them. Freedom and catharsis must be achieved by any means necessary. For real change to happen, it must be the poor who are the driving force behind revolution. The middle classes will have done too well out of colonialism, so a new regime driven by them will be too similar to the old one.","Category":"Sociology"},{"Book":"On Suicide","Author":"Emile Durkheim","Description":"A founding work of sociology that uses statistical data to argue that suicide is not just an individual reaction to individual circumstances. Suicide rates are, in fact, clearly linked to social factors.","Question":"Why do people commit suicide?","Big Idea":"THERE ARE SOCIAL REASONS WHY PEOPLE COMMIT SUICIDE. IT IS NOT JUST BECAUSE OF PERSONAL ISSUES.","Summary":"We often think of suicide as both a private and an individual decision, the result of specific troubles such as bereavement, bankruptcy, shame, or mental illness. But different social groups appear to have different suicide rates, and these rates remain more or less the same each year. It is the depth of connections between an individual and a particular social group, and the degree of moral regulation provided by that group, that determine a society's suicide rates.","Category":"Sociology"},{"Book":"Discipline and Punish","Author":"Michel Foucault","Description":"Traces the history of modern disciplinary techniques such as surveillance and their relation to the construction of modern knowledge systems.","Question":"How does a modern state ensure that it controls its citizens?","Big Idea":"MODERN INSTITUTIONS ARE DESIGNED TO CONTROL OUR SOULS.","Summary":"Public torture and execution is no longer acceptable in the majority of Western states. But according to Foucault, the disappearance of these punishments for wrongdoers has little to do with benevolence. Today's highly regimented prison systems are, in fact, part of a calculated move made by a number of modern institutions to assume more control over a state's citizens. The old methods punished the body. The new methods want to punish the soul.","Category":"Sociology"},{"Book":"Black Skin, White Masks","Author":"Frantz Fanon","Description":"A psychiatric and psychoanalytic analysis of colonial racism's effects on black colonials' identity, self-perception, and mental wellbeing.","Question":"How does race and culture play a part in our own perception of ourselves?","Big Idea":"COLONIALISM MENTALLY DAMAGES THE COLONIZED: THE IMPOSITION OF A FOREIGN CULTURE ON INDIVIDUALS DESTROYS THEIR SENSE OF IDENTITY AND LEADS TO EMOTIONAL DISORDER.","Summary":"The West justified colonialism with the claim that white men had a duty to civilize \"primitive\" black populations. When Westerners seized power in other countries, they erased the native culture and imposed their own cultural system. Fanon argues that this cultural takeover is racist and profoundly destructive. It forces colonized people to adapt to an alien set of values and assumptions, at the core of which is the belief that whites are superior to blacks.","Category":"Sociology"},{"Book":"Politics as a Vocation","Author":"Max Weber","Description":"A modern, organized professional government needs to have a charismatic, pragmatic leader at its helm, while the state has the sole right to use force within its territory.","Question":"How was the nature and practise of politics changed by its professionalization in the 20thcentury?","Big Idea":"A MODERN STATE HAS A MONOPOLY ON LEGITIMATE FORCE IN A GIVEN TERRITORY.","Summary":"Concerned by Germany's unstable political situation after losing World War I, Weber looks to define political power and the role of government, and work out what kind of leaders and politicians a modern state really needs. Weber decided that since societies are increasingly organized around professional, bureaucratic states, they need strong, charismatic leaders who understand the true realities of the world—and certainly not idealists.","Category":"Sociology"},{"Book":"Orientalism","Author":"Edward Said","Description":"A groundbreaking classic of postcolonial studies, demanding an understanding of the Middle and Far East undistorted by inaccurate stereotypes and Western assumptions of dominance.","Question":"","Big Idea":"\"THE ORIENT\" IS NOT A REAL PLACE; IT IS A WESTERN IDEA.","Summary":"The West justified its colonial exploitation of Asia and the Middle East by pointing to \"Oriental\" irrationality and barbarity. Exporting Western civilization was considered something of a duty. But, Edward Said argues, this exotic, primitive Orient did not exist until the West found a reason to invent it. European culture gained strength and identity from this \"opposite,\" as well as a rationale for the colonial project of exploitation.","Category":"Sociology"},{"Book":"The Selfish Gene","Author":"Richard Dawkins","Description":"The individual has one purpose, argues Dawkins: to be a vessel that ensures the survival of the genes it carries. A book of readable—and controversial—popular science.","Question":"","Big Idea":"IT'S OUR GENES THAT DRIVE OUR SURVIVAL—EVEN IF WE HAVE TO PERISH TO PASS THEM ON.","Summary":"It's natural that nobody wants to die. So why do parents throw themselves in front of a car to save their child? Dawkins says we can behave unselfishly because our genes are selfish. They must survive ahead of the individual and guarantee that the species continues. Dawkins shifted discussions of where evolution operates away from whole organisms like animals down to the level of genes. But is it possible to resist the gene and fight this natural selection? Dawkins says humans alone can do it.","Category":"Sociology"},{"Book":"The Souls of Black Folk","Author":"W.E.B Du Bois","Description":"Absolute equality is absolutely essential, states Du Bois, discussing the anguish caused by racism in the United States of the early twentieth century.","Question":"How does racism affect identity?","Big Idea":"THERE CAN BE NO COMPROMISE IN THE FIGHT FOR RACIAL EQUALITY.","Summary":"Despite being freed from slavery, blacks in early twentieth century America had not been freed from racism. Du Bois demanded action. He was one of the first to insist that blacks were not biologically inferior to whites. But despite this equality, black identity was being defined by white society. Du Bois also argued that racism was hurting whites as much as it was hurting blacks. Over 100 years ago Souls claimed that racism was, and would continue to be, the greatest problem America would face.","Category":"Sociology"},{"Book":"A Theology of Liberation: History, Politics, and Salvation","Author":"Gustavo Gutiérrez","Description":"A classic text of liberation theology. The economic and social conditions that lead to poverty and oppression are humanity's ultimate sin. Therefore Christians must truly understand the situations of the impoverished and work alongside them in their struggle for freedom.","Question":"","Big Idea":"THE CATHOLIC CHURCH MUST ACTIVELY CONFRONT POVERTY AND OPPRESSION ACROSS THE WORLD.","Summary":"Jesus showed his love for the poor in practical ways—healing the sick, feeding the hungry, liberating the oppressed. He saw that economic, political, social, and spiritual development is all deeply connected, so the Church cannot separate itself from economic and political realities. It must therefore become politically active, and all Christians should work with the disadvantaged to improve their social and economic conditions.","Category":"Theology"},{"Book":"Mere Christianity","Author":"C. S. Lewis","Description":"A reasoned, critical justification of Christian thought, intended to challenge the assumption that science is all we need to explain the facts of the universe.","Question":"","Big Idea":"IT IS RATIONAL TO BELIEVE IN THE GOD OF CHRISTIANITY.","Summary":"There is a universal moral law—or set of basic values—governing human behavior, telling us what we ought to do. This is why we simply know that killing, stealing, and lying are wrong. Even though this cannot be proved scientifically, our human ability to reason allows us to make a rational claim that this moral law exists. And the fact that this law exists then leads us to conclude—again rationally—that there is something else that exists beyond the material world. That something is God.","Category":"Theology"},{"Book":"Confessions","Author":"Augustine","Description":"This classic work of autobiography and theology from the Mediterranean world of the fourth and fifth centuries c.e. tells of the trials and satisfactions of the act of religious confession.","Question":"Humans will always be imperfect in the eyes of God, but should we feel able to embrace our frailties?","Big Idea":"GOD SHAPES PEOPLE'S LIVES TO GUIDE THEM TO HIM.","Summary":"Salvation is a gift that is revealed through personal histories. It is, in other words, God working through human decisions as the human soul journeys towards knowing and loving God. Just as Christ descended to become human, we must all humbly accept where we are and then rely on faith in the Incarnate Word to ascend to God. God is reflected in all individual experiences. Knowledge of God must occur between God and the human soul.","Category":"Theology"},{"Book":"The Rule of Saint Benedict","Author":"St. Benedict of Nursia","Description":"Communal living still demands rules and hierarchy to function effectively. St. Benedict's insight into European monastic life around 1500 years ago continues to inspire thinking on how best to live and work together.","Question":"How should monks and nuns organise themselves in order to live a truly spiritual life?","Big Idea":"COMMUNAL LIVING DEMANDS GUIDELINES THAT MUST BE FOLLOWED FOR THAT COMMUNITY TO FLOURISH.","Summary":"Monasteries can only endure if their members dedicate themselves to this self-sustaining community. Rules must be followed, although those rules must strike a sustainable balance between daily structure and personal freedoms. Monks and nuns should permanently commit to a monastery, they should choose one of their own as a leader, and should perform necessary physical tasks. These rules of organization and proper commitment to them are vital in any closed community.","Category":"Theology"}];

  const allBtn = document.createElement('button');
  allBtn.className = 'filter-btn active';
  allBtn.textContent = 'All';
  allBtn.dataset.cat = 'All';
  allBtn.onclick = () => setCategory('All');
  wrap.appendChild(allBtn);

  categories.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.textContent = cat;
    btn.dataset.cat = cat;
    btn.onclick = () => setCategory(cat);
    wrap.appendChild(btn);
  });
}

function setCategory(cat) {
  activeCategory = cat;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.cat === cat);
  });
  render();
}

function getFiltered() {
  const q = searchQuery.toLowerCase();
  return BOOKS.filter(b => {
    const catMatch = activeCategory === 'All' || b.Category === activeCategory;
    if (!catMatch) return false;
    if (!q) return true;
    return (b.Book||'').toLowerCase().includes(q) ||
           (b.Author||'').toLowerCase().includes(q) ||
           (b.Description||'').toLowerCase().includes(q) ||
           (b.Big_Idea||b['Big Idea']||'').toLowerCase().includes(q) ||
           (b.Summary||'').toLowerCase().includes(q) ||
           (b.Category||'').toLowerCase().includes(q);
  });
}

function render() {
  const grid = document.getElementById('grid');
  const empty = document.getElementById('emptyMsg');
  const filtered = getFiltered();

  // Remove all cards
  grid.querySelectorAll('.card').forEach(c => c.remove());

  document.getElementById('resultCount').innerHTML =
    `<strong>${filtered.length}</strong> of ${BOOKS.length} books`;

  if (filtered.length === 0) {
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  filtered.forEach((book, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = `${Math.min(i * 0.03, 0.6)}s`;

    const color = CATEGORY_COLORS[book.Category] || '#c9a84c';
    const catLabel = book.Category || '';
    const bigIdea = book['Big Idea'] || '';
    const question = book.Question || '';
    const summary = book.Summary || '';
    const description = book.Description || '';

    card.innerHTML = `
      <span class="card-category" style="color:${color}; border-color:${color}33;">${catLabel}</span>
      <div class="card-title">${book.Book}</div>
      <div class="card-author">${book.Author}</div>
      ${description ? `<div class="card-description">${description}</div>` : ''}
      <div class="card-extra">
        ${bigIdea ? `<div class="extra-section"><div class="extra-label">Big Idea</div><div class="big-idea-text">${bigIdea}</div></div>` : ''}
        ${question && question !== 'N/A' ? `<div class="extra-section"><div class="extra-label">Key Question</div><div class="extra-text">${question}</div></div>` : ''}
        ${summary ? `<div class="extra-section"><div class="extra-label">Summary</div><div class="extra-text">${summary}</div></div>` : ''}
      </div>
    `;

    card.addEventListener('click', () => {
      const isExpanded = card.classList.contains('expanded');
      document.querySelectorAll('.card.expanded').forEach(c => c.classList.remove('expanded'));
      if (!isExpanded) card.classList.add('expanded');
    });

    grid.appendChild(card);
  });
}

document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value;
  render();
});

buildFilters();
render();
</script>
</article>
</main>
</body>
