  <style>
    :root {
      --bg-deep: #0d1117;
      --bg-card: #161b22;
      --bg-elevated: #1f2937;
      --bg-sidebar: #111827;
      --accent: #c9a227;
      --accent-soft: rgba(201,162,39,0.14);
      --accent-dim: rgba(201,162,39,0.06);
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --text-dim: #64748b;
      --border: rgba(255,255,255,0.07);
      --border-accent: rgba(201,162,39,0.3);
      --islamic-light: #40916c;
      --europe-light: #457b9d;
      --ottoman-light: #e07a7d;
      --judaism-light: #a599e9;
      --christianity-light: #c4b5e0;
      --eastern-light: #2dd4bf;
      --intellectual-light: #d4a373;
      --science-light: #38bdf8;
      --universe-light: #93c5fd;
      --radius: 10px;
      --radius-sm: 6px;
      --shadow-sm: 0 2px 10px rgba(0,0,0,0.25);
      --sidebar-w: 256px;
      --transition: 0.18s ease;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Source Sans 3", system-ui, sans-serif;
      background: var(--bg-deep);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.55;
      font-size: 15px;
    }

    /* ─── LAYOUT ─── */
    #app { display: flex; min-height: 100vh; }

    #sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      z-index: 100;
    }
    #sidebar::-webkit-scrollbar { width: 4px; }
    #sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    #sidebar-toggle {
      display: none;
      position: fixed;
      top: 12px; left: 12px;
      z-index: 200;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: var(--radius-sm);
      padding: 6px 10px;
      cursor: pointer;
      font-size: 0.9rem;
      font-family: inherit;
      align-items: center;
      gap: 5px;
    }

    #main { flex: 1; min-width: 0; }

    /* ─── SIDEBAR ─── */
    .sidebar-logo {
      padding: 1.2rem 1rem 0.85rem;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-logo .sub {
      font-size: 0.68rem;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.11em;
      font-weight: 600;
      margin-bottom: 3px;
    }
    .sidebar-logo h1 {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
    }

    .search-wrap {
      padding: 0.7rem 0.9rem;
      border-bottom: 1px solid var(--border);
    }
    #search {
      width: 100%;
      padding: 0.52rem 0.72rem;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--bg-elevated);
      color: var(--text);
      font-size: 0.87rem;
      font-family: inherit;
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    #search::placeholder { color: var(--text-dim); }
    #search:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }

    .sidebar-section {
      padding: 0.8rem 0.9rem 0.6rem;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-section-title {
      font-size: 0.66rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      margin-bottom: 0.55rem;
    }

    /* Category pills */
    .cat-pills { display: flex; flex-direction: column; gap: 2px; }
    .cat-pill {
      display: flex; align-items: center; gap: 7px;
      padding: 5px 7px;
      border-radius: var(--radius-sm);
      border: 1px solid transparent;
      background: none;
      color: var(--text-muted);
      cursor: pointer;
      font-family: inherit;
      font-size: 0.81rem;
      font-weight: 500;
      text-align: left;
      transition: background var(--transition), color var(--transition);
      width: 100%;
    }
    .cat-pill:hover { background: var(--bg-elevated); color: var(--text); }
    .cat-pill.active { background: var(--accent-soft); color: var(--text); border-color: var(--border-accent); }
    .cat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    /* Era buttons */
    .era-btns { display: flex; flex-direction: column; gap: 2px; }
    .era-btn {
      padding: 4px 7px;
      border-radius: var(--radius-sm);
      border: 1px solid transparent;
      background: none;
      color: var(--text-muted);
      cursor: pointer;
      font-family: inherit;
      font-size: 0.79rem;
      text-align: left;
      transition: background var(--transition);
      width: 100%;
    }
    .era-btn:hover { background: var(--bg-elevated); color: var(--text); }
    .era-btn.active { background: var(--accent-soft); color: var(--accent); border-color: var(--border-accent); font-weight: 600; }

    /* Tag cloud */
    .tag-cloud { display: flex; flex-wrap: wrap; gap: 4px; }
    .tag-cloud-btn {
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: none;
      color: var(--text-dim);
      cursor: pointer;
      font-family: inherit;
      font-size: 0.71rem;
      transition: all var(--transition);
    }
    .tag-cloud-btn:hover { background: var(--bg-elevated); color: var(--text); border-color: var(--text-dim); }
    .tag-cloud-btn.active { background: rgba(201,162,39,.2); border-color: var(--accent); color: var(--accent); }
    .tag-cloud-btn::before { content: "#"; opacity: 0.45; }

    /* ─── ACTIVE FILTER BAR ─── */
    #active-filter-bar {
      display: none;
      align-items: center;
      gap: 6px;
      padding: 0.5rem 1.25rem;
      background: var(--accent-dim);
      border-bottom: 1px solid var(--border-accent);
      font-size: 0.81rem;
      flex-wrap: wrap;
    }
    #active-filter-bar.visible { display: flex; }
    .filter-chip {
      display: inline-flex; align-items: center; gap: 4px;
      background: var(--accent-soft);
      border: 1px solid var(--border-accent);
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 0.74rem;
      color: var(--accent);
    }
    .filter-chip button {
      background: none; border: none; cursor: pointer;
      color: var(--accent); font-size: 0.9rem; line-height: 1;
      padding: 0 0 0 2px; opacity: 0.7;
    }
    .filter-chip button:hover { opacity: 1; }
    #clear-all-btn {
      margin-left: auto;
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); font-size: 0.77rem; font-family: inherit;
      text-decoration: underline;
    }
    #clear-all-btn:hover { color: var(--text); }

    /* ─── HEADER ─── */
    header { padding: 1.4rem 1.4rem 0; }
    header h1 {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: clamp(1.55rem, 2.5vw, 2.1rem);
      font-weight: 700;
      color: var(--text);
      line-height: 1.15;
    }
    header h1 span { color: var(--accent); }
    .header-meta { font-size: 0.8rem; color: var(--text-muted); margin-top: 0.25rem; }

    /* ─── STATS BAR ─── */
    .stats-bar {
      padding: 0.6rem 1.4rem;
      font-size: 0.81rem;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
    }
    .stats-bar strong { color: var(--accent); }

    /* ─── TIMELINE GRID ─── */
    #content-area { padding: 1rem 1.25rem 3rem; }
    #timeline-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(100%, 340px), 1fr));
      gap: 0.875rem;
      align-items: start;
    }

    /* ─── EVENT CARD ─── */
    article.event {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color var(--transition), box-shadow var(--transition), transform var(--transition);
    }
    article.event:hover {
      border-color: var(--border-accent);
      box-shadow: var(--shadow-sm);
      transform: translateY(-1px);
    }

    .event-accent-bar { height: 3px; width: 100%; }
    .bar-Universe         { background: linear-gradient(90deg, #1e3a5f, var(--universe-light)); }
    .bar-Islam            { background: linear-gradient(90deg, #2d6a4f, var(--islamic-light)); }
    .bar-Europe           { background: linear-gradient(90deg, #1d3557, var(--europe-light)); }
    .bar-Ottomans         { background: linear-gradient(90deg, #9b2226, var(--ottoman-light)); }
    .bar-Judaism          { background: linear-gradient(90deg, #3d348b, var(--judaism-light)); }
    .bar-Christianity     { background: linear-gradient(90deg, #5c4d7d, var(--christianity-light)); }
    .bar-EasternReligions { background: linear-gradient(90deg, #0f766e, var(--eastern-light)); }
    .bar-Intellectual     { background: linear-gradient(90deg, #7f5539, var(--intellectual-light)); }
    .bar-Science          { background: linear-gradient(90deg, #0369a1, var(--science-light)); }

    .event-body { padding: 0.82rem 1rem 0.88rem; }

    .event-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 0.5rem;
      margin-bottom: 0.4rem;
    }
    .year {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: 1.22rem;
      font-weight: 700;
      color: var(--accent);
      line-height: 1.1;
      flex-shrink: 0;
    }
    .year small {
      display: block;
      font-family: "Source Sans 3", sans-serif;
      font-size: 0.6rem;
      font-weight: 600;
      color: var(--text-dim);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .cat-badge {
      font-size: 0.63rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 2px 7px;
      border-radius: 4px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .cat-Universe         { background: rgba(30,58,95,.55);    color: var(--universe-light); }
    .cat-Islam            { background: rgba(45,106,79,.35);   color: var(--islamic-light); }
    .cat-Europe           { background: rgba(29,53,87,.45);    color: var(--europe-light); }
    .cat-Ottomans         { background: rgba(155,34,38,.4);    color: var(--ottoman-light); }
    .cat-Judaism          { background: rgba(61,52,139,.45);   color: var(--judaism-light); }
    .cat-Christianity     { background: rgba(92,77,125,.45);   color: var(--christianity-light); }
    .cat-EasternReligions { background: rgba(15,118,110,.42);  color: var(--eastern-light); }
    .cat-Intellectual     { background: rgba(127,85,57,.45);   color: var(--intellectual-light); }
    .cat-Science          { background: rgba(3,105,161,.45);   color: var(--science-light); }

    .event-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.38;
      margin-bottom: 0.48rem;
    }

    .event-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
      margin-bottom: 0.5rem;
    }
    .tag-chip {
      font-family: inherit;
      font-size: 0.69rem;
      padding: 2px 7px;
      border-radius: 999px;
      background: var(--bg-elevated);
      color: var(--text-dim);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all var(--transition);
    }
    .tag-chip::before { content: "#"; opacity: 0.45; margin-right: 1px; }
    .tag-chip:hover { background: var(--accent-soft); border-color: var(--border-accent); color: var(--text); }
    .tag-chip.active { background: rgba(201,162,39,.2); border-color: var(--accent); color: var(--accent); }

    /* Description expandable */
    details.event-desc {
      margin-top: 0.4rem;
      border-top: 1px solid var(--border);
      padding-top: 0.4rem;
    }
    details.event-desc summary {
      cursor: pointer;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--accent);
      list-style: none;
      user-select: none;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    details.event-desc summary::-webkit-details-marker { display: none; }
    details.event-desc summary::after { content: " ▸"; opacity: 0.7; margin-left: auto; }
    details.event-desc[open] summary::after { content: " ▾"; }

    .desc-body {
      font-size: 0.84rem;
      color: #b0bec5;
      line-height: 1.6;
      margin-top: 0.5rem;
      padding: 0.4rem 0 0.2rem 0.6rem;
      border-left: 2px solid var(--border-accent);
    }
    .desc-body p { margin: 0 0 0.55rem; }
    .desc-body p:last-child { margin-bottom: 0; }

    /* Related events */
    details.event-connections {
      margin-top: 0.35rem;
      border-top: 1px solid var(--border);
      padding-top: 0.4rem;
    }
    details.event-connections summary {
      cursor: pointer;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--text-muted);
      list-style: none;
      user-select: none;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    details.event-connections summary::-webkit-details-marker { display: none; }
    details.event-connections summary::after { content: " ▸"; opacity: 0.6; margin-left: auto; }
    details.event-connections[open] summary::after { content: " ▾"; }

    .connections-list { display: flex; flex-direction: column; gap: 4px; margin-top: 0.45rem; }
    .conn-link {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      padding: 5px 7px;
      border-radius: var(--radius-sm);
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: border-color var(--transition), background var(--transition);
      text-align: left;
      font-family: inherit;
      width: 100%;
    }
    .conn-link:hover { border-color: var(--border-accent); background: var(--accent-dim); }
    .conn-cat-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
    .conn-year { font-size: 0.69rem; color: var(--accent); font-weight: 700; white-space: nowrap; font-family: "Cormorant Garamond", serif; flex-shrink: 0; padding-top: 1px; min-width: 68px; }
    .conn-title { font-size: 0.77rem; color: var(--text-muted); line-height: 1.3; }

    /* ─── EMPTY STATE ─── */
    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
      grid-column: 1 / -1;
    }
    .empty-state .icon { font-size: 2.2rem; margin-bottom: 0.65rem; }
    .empty-state h3 { font-family: "Cormorant Garamond", serif; font-size: 1.25rem; color: var(--text); margin-bottom: 0.4rem; }

    /* ─── MOBILE ─── */
    @media (max-width: 768px) {
      #sidebar {
        position: fixed;
        left: 0; top: 0;
        transform: translateX(-100%);
        z-index: 150;
        box-shadow: 4px 0 20px rgba(0,0,0,0.5);
        transition: transform var(--transition);
      }
      #sidebar.open { transform: translateX(0); }
      #sidebar-toggle { display: flex; }
      header { padding-top: 2.8rem; }
      #content-area { padding: 0.75rem 0.75rem 3rem; }
      #timeline-grid { grid-template-columns: 1fr; }
    }
    #sidebar-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.5); z-index: 140;
    }
    #sidebar-overlay.visible { display: block; }

,[],[1098,1147,1126,1187],[893,916],[1080,1081,1130,1151],[1108,1193,763,777],[1167,1185,678,1103],[1196],[1181],[1102,1151,1170,1190],[1179,888,904,949],[882],[1045,1083,1093,1116],[],[1103,1167,1177,678],[1105,1110,1116,1140],[1098,1126,1147,1173],[1093,1116,1140,1199],[],[1170,1031,1100,1105],[1156,1042,628,634],[],[1108,1176],[],[1132,1143,805,949],[1112,1121,1178,648],[1149,1131,1168,791],[],[1116,1140,1188,1045]];
const POPULAR_TAGS = ["Buddhism", "Hinduism", "Diplomacy", "China", "India", "Japan", "Papacy", "Crusades", "Politics", "Daoism", "Astronomy", "France", "Medicine", "Reform", "Cold War", "Israel", "Empire", "Genetics", "North Africa", "Egypt", "Sikhism", "Cosmology", "Jainism", "Mediterranean", "Italy", "Tibet", "Mathematics", "Britain", "Shinto", "Iran", "Chemistry", "Modern", "World War I", "Migration", "South Asia", "Philosophy", "Confucian rites", "Punjab", "Enlightenment", "World War II", "Anatolia", "Law", "Succession", "Bhakti", "Early Islam", "Germany", "England", "Reformation", "Habsburg wars", "Climate", "Technology", "Scholasticism", "Diaspora", "Institutions", "Vietnam", "Revolution", "Iraq", "Iberia", "Balkans", "Holocaust", "Archaeology", "Ethics", "Korean religions", "Late antiquity", "Vietnamese religions", "Architecture", "Pogroms", "Electricity", "United States", "Computing", "Pleistocene", "Patronage", "Theology", "Persecution", "Christology", "Physics", "Political thought", "Hungary", "Black Sea", "Colonialism"];

const CATEGORIES = ["Universe","Islam","Europe","Ottomans","Judaism","Christianity","Eastern Religions","Intellectual","Science"];

const ERAS = [
  {label:"All Time",        min:null,    max:null},
  {label:"Deep Time",       min:null,    max:-10000},
  {label:"Prehistory",      min:-10000,  max:-3000},
  {label:"3000–500 BCE",    min:-3000,   max:-500},
  {label:"500 BCE–500 CE",  min:-500,    max:500},
  {label:"500–1000",        min:500,     max:1000},
  {label:"1000–1500",       min:1000,    max:1500},
  {label:"1500–1800",       min:1500,    max:1800},
  {label:"1800–1945",       min:1800,    max:1945},
  {label:"1945–Present",    min:1945,    max:null},
];

const CAT_DOT_COLORS = {
  "Universe":"#93c5fd","Islam":"#40916c","Europe":"#457b9d","Ottomans":"#e07a7d",
  "Judaism":"#a599e9","Christianity":"#c4b5e0","Eastern Religions":"#2dd4bf",
  "Intellectual":"#d4a373","Science":"#38bdf8"
};

// ── State ──────────────────────────────────────────────
const state = { category:"all", era:0, tag:null, search:"" };

// ── Helpers ────────────────────────────────────────────
function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function norm(s){ return (s||"").toLowerCase(); }

function formatYear(ev) {
  if (ev.category === "Universe") {
    const ya = Math.abs(ev.year);
    if (ya >= 1e9) return (ya/1e9).toFixed(2)+" Ga ago";
    if (ya >= 1e6) return (ya/1e6).toFixed(0)+" Ma ago";
    if (ya >= 1e4) return (ya/1e3).toFixed(1)+" ka ago";
    return ya+" years ago";
  }
  return ev.year < 0 ? Math.abs(ev.year)+" BCE" : ev.year+" CE";
}

function eraLabel(ev) {
  if (ev.category === "Universe") return "deep time";
  return ev.year < 0 ? "BCE" : "CE";
}

function catKey(c) { return c.replace(/ /g,""); }
function catDotColor(c) { return CAT_DOT_COLORS[c] || "#c9a227"; }

function matchesFilters(ev, idx) {
  if (state.category !== "all" && ev.category !== state.category) return false;
  const era = ERAS[state.era];
  if (era.min !== null && ev.year < era.min) return false;
  if (era.max !== null && ev.year >= era.max) return false;
  if (state.tag && !(ev.tags||[]).includes(state.tag)) return false;
  if (state.search) {
    const hay = norm(ev.title+" "+(ev.tags||[]).join(" ")+" "+(ev.description||""));
    if (!hay.includes(state.search)) return false;
  }
  return true;
}

function filteredEvents() {
  return EVENTS.map((ev,i) => ({ev,i})).filter(({ev,i}) => matchesFilters(ev,i));
}

// ── Card builder ──────────────────────────────────────
function buildCard(ev, idx) {
  const art = document.createElement("article");
  art.className = "event";
  art.dataset.idx = idx;

  const ck = catKey(ev.category);

  const tagsHtml = (ev.tags||[]).map(t =>
    `<button type="button" class="tag-chip${state.tag===t?" active":""}" data-tag="${esc(t)}">${esc(t)}</button>`
  ).join("");

  const paras = (ev.description||"").split("\n\n").map(p=>p.trim()).filter(Boolean);
  const descHtml = paras.map(p=>`<p>${esc(p)}</p>`).join("");

  const connIdxs = CONNECTIONS[idx] || [];
  const connHtml = connIdxs.slice(0,4).map(j => {
    const cev = EVENTS[j];
    if (!cev) return "";
    return `<button type="button" class="conn-link" data-conn="${j}">
      <span class="conn-cat-dot" style="background:${catDotColor(cev.category)}"></span>
      <span class="conn-year">${esc(formatYear(cev))}</span>
      <span class="conn-title">${esc(cev.title)}</span>
    </button>`;
  }).join("");

  art.innerHTML = `
    <div class="event-accent-bar bar-${esc(ck)}"></div>
    <div class="event-body">
      <div class="event-top">
        <div class="year">${esc(formatYear(ev))}<small>${esc(eraLabel(ev))}</small></div>
        <span class="cat-badge cat-${esc(ck)}">${esc(ev.category)}</span>
      </div>
      <div class="event-title">${esc(ev.title)}</div>
      <div class="event-tags">${tagsHtml}</div>
      ${descHtml ? `<details class="event-desc">
        <summary>Description</summary>
        <div class="desc-body">${descHtml}</div>
      </details>` : ""}
      ${connHtml ? `<details class="event-connections">
        <summary>🔗 Related events</summary>
        <div class="connections-list">${connHtml}</div>
      </details>` : ""}
    </div>`;

  return art;
}

// ── Render ────────────────────────────────────────────
function render() {
  const items = filteredEvents();

  document.getElementById("stats-bar").innerHTML =
    `Showing <strong>${items.length}</strong> of ${EVENTS.length} events`;

  updateFilterBar();

  const grid = document.getElementById("timeline-grid");
  grid.innerHTML = "";
  if (items.length === 0) {
    grid.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><h2>No events found</h2><p>Try adjusting your filters or search.</p></div>`;
    return;
  }
  const frag = document.createDocumentFragment();
  items.forEach(({ev,i}) => frag.appendChild(buildCard(ev,i)));
  grid.appendChild(frag);
}

// ── Filter bar ────────────────────────────────────────
function updateFilterBar() {
  const bar = document.getElementById("active-filter-bar");
  bar.innerHTML = "";
  const chips = [];
  if (state.category !== "all") chips.push({label: state.category, clear: ()=>{state.category="all"; syncSidebar(); render();}});
  if (state.era !== 0) chips.push({label: ERAS[state.era].label, clear: ()=>{state.era=0; syncSidebar(); render();}});
  if (state.tag) chips.push({label:"#"+state.tag, clear: ()=>{state.tag=null; syncSidebar(); render();}});
  if (state.search) chips.push({label:`Search: "${state.search.slice(0,18)}"`, clear: ()=>{state.search=""; document.getElementById("search").value=""; syncSidebar(); render();}});

  if (!chips.length) { bar.classList.remove("visible"); return; }
  bar.classList.add("visible");
  chips.forEach(chip => {
    const el = document.createElement("div");
    el.className = "filter-chip";
    el.innerHTML = `<span>${esc(chip.label)}</span><button type="button" aria-label="Remove filter">×</button>`;
    el.querySelector("button").addEventListener("click", chip.clear);
    bar.appendChild(el);
  });
  const clearAll = document.createElement("button");
  clearAll.id = "clear-all-btn";
  clearAll.textContent = "Clear all";
  clearAll.addEventListener("click", () => {
    state.category="all"; state.era=0; state.tag=null; state.search="";
    document.getElementById("search").value="";
    syncSidebar(); render();
  });
  bar.appendChild(clearAll);
}

// ── Sidebar ───────────────────────────────────────────
function buildSidebar() {
  const catWrap = document.getElementById("cat-pills");
  catWrap.innerHTML = "";
  const allBtn = Object.assign(document.createElement("button"), {type:"button", className:"cat-pill"});
  allBtn.innerHTML = `<span class="cat-dot" style="background:var(--accent)"></span> All`;
  allBtn.addEventListener("click", () => { state.category="all"; syncSidebar(); render(); });
  catWrap.appendChild(allBtn);
  CATEGORIES.forEach(c => {
    const btn = Object.assign(document.createElement("button"), {type:"button", className:"cat-pill"});
    btn.innerHTML = `<span class="cat-dot" style="background:${catDotColor(c)}"></span> ${esc(c)}`;
    btn.dataset.cat = c;
    btn.addEventListener("click", () => { state.category=c; syncSidebar(); render(); });
    catWrap.appendChild(btn);
  });

  const eraWrap = document.getElementById("era-btns");
  eraWrap.innerHTML = "";
  ERAS.forEach((era, idx) => {
    const btn = Object.assign(document.createElement("button"), {type:"button", className:"era-btn"});
    btn.textContent = era.label;
    btn.dataset.era = idx;
    btn.addEventListener("click", () => { state.era=idx; syncSidebar(); render(); });
    eraWrap.appendChild(btn);
  });

  const tagWrap = document.getElementById("tag-cloud");
  tagWrap.innerHTML = "";
  POPULAR_TAGS.forEach(tag => {
    const btn = Object.assign(document.createElement("button"), {type:"button", className:"tag-cloud-btn"});
    btn.textContent = tag;
    btn.dataset.cloudTag = tag;
    btn.addEventListener("click", () => { state.tag = state.tag===tag ? null : tag; syncSidebar(); render(); });
    tagWrap.appendChild(btn);
  });
}

function syncSidebar() {
  document.querySelectorAll(".cat-pill").forEach(b => {
    b.classList.toggle("active", b.dataset.cat === state.category || (!b.dataset.cat && state.category==="all"));
  });
  document.querySelectorAll(".era-btn").forEach(b => {
    b.classList.toggle("active", Number(b.dataset.era) === state.era);
  });
  document.querySelectorAll(".tag-cloud-btn").forEach(b => {
    b.classList.toggle("active", b.dataset.cloudTag === state.tag);
  });
}

// ── Event delegation ──────────────────────────────────
document.addEventListener("click", e => {
  const tagChip = e.target.closest(".tag-chip[data-tag]");
  if (tagChip && document.getElementById("timeline-grid").contains(tagChip)) {
    const tag = tagChip.dataset.tag;
    state.tag = state.tag === tag ? null : tag;
    syncSidebar(); render(); return;
  }

  const connLink = e.target.closest(".conn-link[data-conn]");
  if (connLink) {
    const j = parseInt(connLink.dataset.conn, 10);
    const target = document.querySelector(`article.event[data-idx="${j}"]`);
    if (target) {
      target.scrollIntoView({behavior:"smooth", block:"center"});
      target.style.borderColor = "var(--accent)";
      target.style.boxShadow = "0 0 0 2px var(--accent-soft)";
      setTimeout(() => { target.style.borderColor = ""; target.style.boxShadow = ""; }, 1800);
    } else {
      const cev = EVENTS[j];
      if (cev) {
        state.category="all"; state.era=0; state.tag=null;
        state.search = norm(cev.title.slice(0, 30));
        document.getElementById("search").value = cev.title.slice(0, 30);
        syncSidebar(); render();
        setTimeout(() => {
          const t2 = document.querySelector(`article.event[data-idx="${j}"]`);
          if (t2) t2.scrollIntoView({behavior:"smooth", block:"center"});
        }, 100);
      }
    }
    return;
  }

  if (e.target.closest("#sidebar-toggle")) {
    document.getElementById("sidebar").classList.toggle("open");
    document.getElementById("sidebar-overlay").classList.toggle("visible");
    return;
  }
  if (e.target.id === "sidebar-overlay") {
    document.getElementById("sidebar").classList.remove("open");
    document.getElementById("sidebar-overlay").classList.remove("visible");
    return;
  }
});

document.getElementById("search").addEventListener("input", e => {
  state.search = norm(e.target.value.trim());
  render();
});

// ── Init ──────────────────────────────────────────────
buildSidebar();
syncSidebar();
render();
</script>
</article>
