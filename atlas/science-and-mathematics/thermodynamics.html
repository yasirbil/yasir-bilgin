<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --card: #20243a;
    --border: #2e3354;
    --accent: #6c8cff;
    --accent2: #ff7eb3;
    --accent3: #56e0a0;
    --accent4: #ffd166;
    --text: #e8eaf6;
    --muted: #8b90b8;
    --tag-law: #3a2f6b;
    --tag-law-text: #a78bfa;
    --tag-concept: #1e3a4a;
    --tag-concept-text: #56cfe1;
    --tag-process: #1e3a2f;
    --tag-process-text: #56e0a0;
    --tag-cycle: #3a2a1e;
    --tag-cycle-text: #ffd166;
    --tag-formula: #3a1e2a;
    --tag-formula-text: #ff7eb3;
    --diff-basic: #1b3a2f;
    --diff-basic-text: #4ade80;
    --diff-inter: #2a2a1a;
    --diff-inter-text: #facc15;
    --diff-adv: #3a1a1a;
    --diff-adv-text: #f87171;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: linear-gradient(135deg, #1a1d27 0%, #0f1117 60%, #1a1225 100%);
    border-bottom: 1px solid var(--border);
    padding: 48px 24px 36px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    top: -60px; left: 50%;
    transform: translateX(-50%);
    max-width: 600px; width: 100%; height: 200px;
    background: radial-gradient(ellipse, rgba(108,140,255,0.15) 0%, transparent 70%);
    pointer-events: none;
  }
  header h1 {
    font-size: clamp(1.8rem, 6vw, 2.6rem);
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(90deg, #6c8cff, #a78bfa, #ff7eb3);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 10px;
  }
  header p {
    color: var(--muted);
    font-size: 1.05rem;
    max-width: 560px;
    margin: 0 auto;
    line-height: 1.6;
  }
  .stat-bar {
    display: flex;
    justify-content: center;
    gap: 32px;
    margin-top: 24px;
    flex-wrap: wrap;
  }
  .stat { text-align: center; }
  .stat-num { font-size: 1.6rem; font-weight: 700; color: var(--accent); }
  .stat-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

  /* ── Controls ── */
  .controls {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(15,17,23,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
  }
  .search-wrap {
    max-width: 600px;
    margin: 0 auto 14px;
    position: relative;
  }
  .search-wrap svg {
    position: absolute;
    left: 14px; top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
  }
  #searchInput {
    width: 100%;
    padding: 12px 16px 12px 44px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 1rem;
    outline: none;
    transition: border-color 0.2s;
  }
  #searchInput:focus { border-color: var(--accent); }
  #searchInput::placeholder { color: var(--muted); }
  #clearBtn {
    position: absolute;
    right: 12px; top: 50%;
    transform: translateY(-50%);
    background: none; border: none;
    color: var(--muted); cursor: pointer;
    font-size: 1.1rem; padding: 4px 6px;
    border-radius: 4px; display: none;
  }
  #clearBtn:hover { color: var(--text); background: var(--border); }

  .filter-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    align-items: center;
  }
  .filter-group { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; }
  .filter-divider {
    width: 1px; height: 24px;
    background: var(--border);
    margin: 0 4px;
  }
  .filter-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.82rem;
    font-weight: 500;
    transition: all 0.18s;
    white-space: nowrap;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 600;
  }
  .filter-btn[data-cat="law"].active     { background: var(--tag-law-text); border-color: var(--tag-law-text); }
  .filter-btn[data-cat="concept"].active { background: var(--tag-concept-text); border-color: var(--tag-concept-text); color: #0f1117; }
  .filter-btn[data-cat="process"].active { background: var(--tag-process-text); border-color: var(--tag-process-text); color: #0f1117; }
  .filter-btn[data-cat="cycle"].active   { background: var(--tag-cycle-text); border-color: var(--tag-cycle-text); color: #0f1117; }
  .filter-btn[data-cat="formula"].active { background: var(--tag-formula-text); border-color: var(--tag-formula-text); color: #0f1117; }
  .filter-btn[data-diff="basic"].active  { background: var(--diff-basic-text); border-color: var(--diff-basic-text); color: #0f1117; }
  .filter-btn[data-diff="intermediate"].active { background: var(--diff-inter-text); border-color: var(--diff-inter-text); color: #0f1117; }
  .filter-btn[data-diff="advanced"].active { background: var(--diff-adv-text); border-color: var(--diff-adv-text); color: #0f1117; }

  /* ── Grid ── */
  main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 28px 20px 60px;
  }
  .results-info {
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 18px;
    text-align: center;
  }
  .results-info span { color: var(--accent); font-weight: 600; }
  #grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 18px;
  }

  /* ── Card ── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px;
    transition: transform 0.18s, border-color 0.18s, box-shadow 0.18s;
    display: flex;
    flex-direction: column;
    gap: 12px;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    border-radius: 14px 14px 0 0;
  }
  .card[data-cat="law"]::before     { background: linear-gradient(90deg, #a78bfa, #6c8cff); }
  .card[data-cat="concept"]::before { background: linear-gradient(90deg, #56cfe1, #00b4d8); }
  .card[data-cat="process"]::before { background: linear-gradient(90deg, #56e0a0, #38b000); }
  .card[data-cat="cycle"]::before   { background: linear-gradient(90deg, #ffd166, #f4a261); }
  .card[data-cat="formula"]::before { background: linear-gradient(90deg, #ff7eb3, #e040fb); }
  .card:hover {
    transform: translateY(-3px);
    border-color: rgba(108,140,255,0.4);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
  .card-title {
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--text);
    line-height: 1.3;
    flex: 1;
  }
  .badge-group { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; flex-shrink: 0; }
  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }
  .badge-law     { background: var(--tag-law);     color: var(--tag-law-text); }
  .badge-concept { background: var(--tag-concept); color: var(--tag-concept-text); }
  .badge-process { background: var(--tag-process); color: var(--tag-process-text); }
  .badge-cycle   { background: var(--tag-cycle);   color: var(--tag-cycle-text); }
  .badge-formula { background: var(--tag-formula); color: var(--tag-formula-text); }
  .badge-basic   { background: var(--diff-basic);  color: var(--diff-basic-text); }
  .badge-intermediate { background: var(--diff-inter);  color: var(--diff-inter-text); }
  .badge-advanced { background: var(--diff-adv);   color: var(--diff-adv-text); }

  .card-desc {
    font-size: 0.88rem;
    color: var(--muted);
    line-height: 1.65;
    flex: 1;
  }
  .card-desc mark {
    background: rgba(108,140,255,0.3);
    color: var(--text);
    border-radius: 2px;
    padding: 0 2px;
  }
  .formula-block {
    background: rgba(0,0,0,0.35);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
  }
  .formula-label {
    font-size: 0.7rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 6px;
  }
  .formula-item {
    font-family: 'Courier New', monospace;
    font-size: 0.9rem;
    color: var(--accent4);
    margin-bottom: 3px;
  }
  .formula-item:last-child { margin-bottom: 0; }
  .formula-note {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 5px;
    line-height: 1.5;
  }
  .key-points {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .key-point {
    font-size: 0.82rem;
    color: var(--muted);
    padding-left: 12px;
    position: relative;
    line-height: 1.5;
  }
  .key-point::before {
    content: '▸';
    position: absolute;
    left: 0;
    color: var(--accent);
    font-size: 0.7rem;
    top: 2px;
  }

  /* ── No results ── */
  .no-results {
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
    grid-column: 1 / -1;
  }
  .no-results svg { margin-bottom: 16px; opacity: 0.4; }
  .no-results h3 { font-size: 1.2rem; color: var(--text); margin-bottom: 8px; }

  /* ── Footer ── */
  footer {
    text-align: center;
    padding: 24px;
    color: var(--muted);
    font-size: 0.8rem;
    border-top: 1px solid var(--border);
  }

  @media (max-width: 600px) {
    header h1 { font-size: clamp(1.8rem, 6vw, 1.8rem); }
    #grid { grid-template-columns: 1fr; }
    .filter-divider { display: none; }
  }

<script>
const DATA = [
  // ── LAWS ──
  {
    title: "Zeroth Law of Thermodynamics",
    cat: "law",
    diff: "basic",
    desc: "If two systems are each in thermal equilibrium with a third system, they are in thermal equilibrium with each other. This law establishes temperature as a fundamental and measurable property, and is the logical foundation for thermometry.",
    formulas: [],
    points: [
      "Defines transitive property of thermal equilibrium",
      "Justifies the use of thermometers",
      "Named 'zeroth' because it was formalized after the 1st and 2nd laws, yet precedes them logically"
    ]
  },
  {
    title: "First Law of Thermodynamics",
    cat: "law",
    diff: "basic",
    desc: "Energy cannot be created or destroyed — only converted from one form to another. The change in internal energy of a closed system equals the heat added to the system minus the work done by the system.",
    formulas: ["ΔU = Q − W", "Q = ΔU + W"],
    formulaNote: "ΔU = change in internal energy, Q = heat added, W = work done by system",
    points: [
      "Conservation of energy applied to thermodynamic systems",
      "W > 0 means work is done BY the system; sign conventions vary by convention",
      "Basis of heat engine and refrigerator analysis"
    ]
  },
  {
    title: "Second Law of Thermodynamics",
    cat: "law",
    diff: "intermediate",
    desc: "Heat flows spontaneously from hot to cold, never the reverse. The total entropy of an isolated system can never decrease over time — it either increases (irreversible process) or stays constant (reversible process). No heat engine can be 100% efficient.",
    formulas: ["dS ≥ δQ / T", "η_max = 1 − T_C / T_H  (Carnot)"],
    formulaNote: "S = entropy, T = absolute temperature, η = thermal efficiency",
    points: [
      "Kelvin–Planck statement: no device converts all heat to work",
      "Clausius statement: no device moves heat from cold to hot without work",
      "Defines the arrow of time in physics"
    ]
  },
  {
    title: "Third Law of Thermodynamics",
    cat: "law",
    diff: "intermediate",
    desc: "As the temperature of a system approaches absolute zero (0 K), its entropy approaches a constant minimum value (zero for a perfect crystal). It is impossible to reach absolute zero in a finite number of steps.",
    formulas: ["lim(T→0) S = 0"],
    formulaNote: "Valid for a perfect crystalline substance at 0 K",
    points: [
      "Absolute entropy can be calculated by integrating Cp/T from 0 K",
      "Explains why liquid helium can be cooled but 0 K is unreachable",
      "Basis for standard molar entropies tabulated in chemistry"
    ]
  },

  // ── CONCEPTS ──
  {
    title: "Internal Energy (U)",
    cat: "concept",
    diff: "basic",
    desc: "The total microscopic energy of a system — the sum of kinetic energies of all particles and the potential energies of their interactions. It is a state function: its value depends only on the current state of the system, not on the path taken to reach it.",
    formulas: ["ΔU = Q − W", "U = Σ(KE_i + PE_i)"],
    formulaNote: "For an ideal monatomic gas: U = (3/2)nRT",
    points: [
      "State function — path independent",
      "Includes translational, rotational, vibrational, and electronic energy",
      "For ideal gases, U depends only on temperature"
    ]
  },
  {
    title: "Entropy (S)",
    cat: "concept",
    diff: "intermediate",
    desc: "A measure of the disorder or randomness of a system, or equivalently the number of microscopic configurations consistent with its macroscopic state. Entropy always increases in spontaneous irreversible processes in an isolated system.",
    formulas: ["S = k_B · ln(Ω)", "dS = δQ_rev / T", "ΔS_univ ≥ 0"],
    formulaNote: "k_B = Boltzmann constant (1.38×10⁻²³ J/K), Ω = number of microstates",
    points: [
      "Statistical definition by Boltzmann; thermodynamic definition by Clausius",
      "Entropy of mixing is always positive for ideal gases",
      "Driving force for many spontaneous processes in nature and chemistry"
    ]
  },
  {
    title: "Enthalpy (H)",
    cat: "concept",
    diff: "basic",
    desc: "A thermodynamic potential defined as the sum of a system's internal energy and the product of pressure and volume. At constant pressure, the change in enthalpy equals the heat exchanged — making it the key quantity for chemical reactions and engineering processes.",
    formulas: ["H = U + PV", "ΔH = Q_p  (const. pressure)", "ΔH = ΔU + Δ(PV)"],
    formulaNote: "ΔH < 0: exothermic; ΔH > 0: endothermic",
    points: [
      "State function, extensive property",
      "Standard enthalpy of formation tabulated for thousands of compounds",
      "Hess's Law: ΔH is path-independent, allowing summation of reactions"
    ]
  },
  {
    title: "Gibbs Free Energy (G)",
    cat: "concept",
    diff: "intermediate",
    desc: "The thermodynamic potential that predicts spontaneity at constant temperature and pressure. A process is spontaneous if ΔG < 0, at equilibrium if ΔG = 0, and non-spontaneous if ΔG > 0. It combines enthalpy and entropy into a single criterion.",
    formulas: ["G = H − TS", "ΔG = ΔH − TΔS", "ΔG° = −RT ln(K)"],
    formulaNote: "R = 8.314 J/(mol·K); K = equilibrium constant",
    points: [
      "Maximum non-expansion work a system can do at constant T, P",
      "Central to chemical equilibrium and electrochemistry",
      "ΔG = ΔG° + RT ln(Q) relates to reaction quotient Q"
    ]
  },
  {
    title: "Helmholtz Free Energy (A or F)",
    cat: "concept",
    diff: "advanced",
    desc: "The thermodynamic potential that predicts spontaneity at constant temperature and volume. Equals the maximum work a system can perform at constant T and V. Particularly important in statistical mechanics and systems at fixed volume.",
    formulas: ["A = U − TS", "ΔA = ΔU − TΔS", "dA = −SdT − PdV"],
    formulaNote: "Minimized at equilibrium for constant T, V systems",
    points: [
      "Also called the work function",
      "Naturally related to the canonical partition function Z: A = −k_B T ln(Z)",
      "Preferred over Gibbs free energy when volume is constant"
    ]
  },
  {
    title: "Heat (Q)",
    cat: "concept",
    diff: "basic",
    desc: "Energy transferred between a system and its surroundings due to a temperature difference. Heat is not a property of a system — it is energy in transit. It flows from higher to lower temperature until thermal equilibrium is reached.",
    formulas: ["Q = mcΔT  (sensible heat)", "Q = mL  (latent heat)", "Q = ∫ nCᵥ dT"],
    formulaNote: "m = mass, c = specific heat capacity, L = latent heat, Cᵥ = molar heat capacity",
    points: [
      "Path function — depends on how the process occurs",
      "Positive convention: Q > 0 means heat flows INTO the system",
      "Latent heat involves phase change at constant temperature"
    ]
  },
  {
    title: "Work (W)",
    cat: "concept",
    diff: "basic",
    desc: "Energy transferred between a system and surroundings when a force acts through a displacement — in thermodynamics, most commonly through expansion or compression of a gas against an external pressure.",
    formulas: ["W = ∫ P dV  (expansion work)", "W = PΔV  (constant pressure)", "W = nRT ln(V₂/V₁)  (isothermal ideal gas)"],

// ── Render ──
const grid = document.getElementById('grid');
const searchInput = document.getElementById('searchInput');
const clearBtn = document.getElementById('clearBtn');
const visCount = document.getElementById('visCount');
const totalCount = document.getElementById('totalCount');
totalCount.textContent = DATA.length;

let activeCat = 'all';
let activeDiff = 'all';
let searchQuery = '';

function highlight(text, query) {
  if (!query) return text;
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(`(${escaped})`, 'gi'), '<mark>$1</mark>');
}

function buildCard(item, query) {
  const catBadge = `<span class="badge badge-${item.cat}">${item.cat}</span>`;
  const diffBadge = `<span class="badge badge-${item.diff}">${item.diff}</span>`;
  const title = highlight(item.title, query);
  const desc = highlight(item.desc, query);
  const formulaHTML = item.formulas && item.formulas.length ? `
    <div class="formula-block">
      <div class="formula-label">Key Formulas</div>
      ${item.formulas.map(f => `<div class="formula-item">${highlight(f, query)}</div>`).join('')}
      ${item.formulaNote ? `<div class="formula-note">${highlight(item.formulaNote, query)}</div>` : ''}
    </div>` : '';
  const pointsHTML = item.points && item.points.length ? `
    <div class="key-points">
      ${item.points.map(p => `<div class="key-point">${highlight(p, query)}</div>`).join('')}
    </div>` : '';

  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.cat = item.cat;
  card.dataset.diff = item.diff;
  card.innerHTML = `
    <div class="card-header">
      <div class="card-title">${title}</div>
      <div class="badge-group">${catBadge}${diffBadge}</div>
    </div>
    <div class="card-desc">${desc}</div>
    ${formulaHTML}
    ${pointsHTML}
  `;
  return card;
}

function render() {
  const q = searchQuery.toLowerCase().trim();
  grid.innerHTML = '';
  let shown = 0;
  DATA.forEach(item => {
    const catOk = activeCat === 'all' || item.cat === activeCat;
    const diffOk = activeDiff === 'all' || item.diff === activeDiff;
    const searchOk = !q || [
      item.title, item.desc,
      ...(item.formulas || []),
      item.formulaNote || '',
      ...(item.points || [])
    ].some(s => s.toLowerCase().includes(q));
    if (catOk && diffOk && searchOk) {
      grid.appendChild(buildCard(item, q));
      shown++;
    }
  });
  visCount.textContent = shown;
  if (shown === 0) {
    grid.innerHTML = `<div class="no-results">
      <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <h2>No results found</h2>
      <p>Try a different search term or clear the filters.</p>
    </div>`;
  }
}

// Search
searchInput.addEventListener('input', () => {
  searchQuery = searchInput.value;
  clearBtn.style.display = searchQuery ? 'block' : 'none';
  render();
});
clearBtn.addEventListener('click', () => {
  searchInput.value = '';
  searchQuery = '';
  clearBtn.style.display = 'none';
  searchInput.focus();
  render();
});

// Category filters
document.getElementById('catFilters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn[data-cat]');
  if (!btn) return;
  document.querySelectorAll('#catFilters .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeCat = btn.dataset.cat;
  render();
});

// Difficulty filters
document.getElementById('diffFilters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn[data-diff]');
  if (!btn) return;
  document.querySelectorAll('#diffFilters .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeDiff = btn.dataset.diff;
  render();
});

render();
</script>
