<style>
:root {
  --bg:          #f2ebe0;
  --ink:         #1a1308;
  --ink-mid:     #3b2c13;
  --ink-light:   #7a6340;
  --gold:        #8c6d1f;
  --gold-bright: #c49a28;
  --gold-pale:   #d4b96a;
  --card:        #faf6ee;
  --border:      rgba(140,109,31,0.2);
  --border-med:  rgba(140,109,31,0.38);
  --shadow-sm:   0 1px 12px rgba(26,19,8,0.07);
  --shadow-lg:   0 6px 36px rgba(26,19,8,0.14);
  --r: 3px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'EB Garamond', Georgia, serif;
  min-height: 100vh;
  background-image:
    url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%238c6d1f' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/svg%3E"),
    radial-gradient(ellipse at 15% 0%,rgba(196,154,40,.08) 0%,transparent 55%),
    radial-gradient(ellipse at 85% 100%,rgba(122,51,24,.05) 0%,transparent 55%);
}

/* ── HEADER ── */
header { text-align:center; padding:72px 24px 48px; position:relative; }
header::before {
  content:'';
  position:absolute; inset:0;
  background:linear-gradient(180deg,rgba(140,109,31,.07) 0%,transparent 80%);
  pointer-events:none;
}
.orn {
  display:flex; align-items:center; justify-content:center;
  gap:16px; margin-bottom:24px;
}
.orn::before,.orn::after {
  content:''; height:1px; width:80px;
}
.orn::before { background:linear-gradient(90deg,transparent,var(--gold-pale)); }
.orn::after  { background:linear-gradient(90deg,var(--gold-pale),transparent); }
.orn span { color:var(--gold); font-size:1.1rem; letter-spacing:.6em; }
header h1 {
  font-family:'Cinzel',serif;
  font-size:clamp(1.9rem,5vw,3.6rem);
  font-weight:700; color:var(--ink);
  letter-spacing:.04em; line-height:1.15;
}
header h1 em { font-style:normal; color:var(--gold); }
.h-sub { margin-top:12px; font-size:1.1rem; color:var(--ink-light); font-style:italic; }
.h-rule {
  width:120px; height:1px;
  background:linear-gradient(90deg,transparent,var(--gold-pale),transparent);
  margin:20px auto 12px;
}
.h-meta {
  font-family:'Cinzel',serif; font-size:.72rem;
  letter-spacing:.18em; text-transform:uppercase; color:var(--ink-light);
}

/* ── CONTROLS ── */
.controls {
  max-width:1240px; margin:40px auto 0;
  padding:0 24px; display:flex; flex-direction:column; gap:18px;
}
.search-wrap { position:relative; }
.search-icon {
  position:absolute; left:16px; top:50%;
  transform:translateY(-50%);
  color:var(--ink-light); pointer-events:none;
  width:17px; height:17px;
}
#search {
  width:100%; padding:13px 16px 13px 46px;
  border:1.5px solid var(--border-med); border-radius:var(--r);
  background:var(--card);
  font-family:'EB Garamond',serif; font-size:1.05rem; color:var(--ink);
  outline:none; transition:border-color .2s,box-shadow .2s;
  box-shadow:var(--shadow-sm);
}
#search::placeholder { color:var(--ink-light); font-style:italic; }
#search:focus {
  border-color:var(--gold);
  box-shadow:0 0 0 3px rgba(140,109,31,.12),var(--shadow-sm);
}

.filters-row { display:flex; flex-wrap:wrap; gap:7px; align-items:center; }
.filter-label {
  font-family:'Cinzel',serif; font-size:.7rem;
  letter-spacing:.14em; text-transform:uppercase;
  color:var(--ink-light); margin-right:6px; flex-shrink:0;
}
.tag-btn {
  padding:5px 13px;
  border:1.5px solid var(--border); border-radius:2px;
  background:transparent;
  font-family:'EB Garamond',serif; font-size:.88rem; color:var(--ink-mid);
  cursor:pointer; transition:all .16s; letter-spacing:.02em; white-space:nowrap;
}
.tag-btn:hover { background:rgba(140,109,31,.1); border-color:var(--gold); color:var(--ink); }
.tag-btn.active {
  background:var(--gold); border-color:var(--gold);
  color:#fff; font-weight:600; letter-spacing:.03em;
}

/* ── INFO ── */
.results-info {
  max-width:1240px; margin:20px auto 0; padding:0 24px;
  font-size:.82rem; color:var(--ink-light);
  letter-spacing:.06em; text-transform:uppercase;
  font-family:'Cinzel',serif;
}

/* ── GRID ── */
.grid {
  max-width:1240px; margin:16px auto 100px;
  padding:0 24px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(310px,1fr));
  gap:18px;
}

/* ── CARD ── */
.card {
  background:var(--card);
  border:1px solid var(--border); border-radius:var(--r);
  padding:24px 22px 20px;
  box-shadow:var(--shadow-sm);
  display:flex; flex-direction:column; position:relative;
  transition:transform .22s,box-shadow .22s,border-color .22s;
  animation:fadeUp .3s ease both; overflow:hidden;
}
.card::before {
  content:''; position:absolute;
  top:0; left:0; right:0; height:2px;
  background:linear-gradient(90deg,var(--gold) 0%,var(--gold-bright) 50%,var(--gold) 100%);
  opacity:0; transition:opacity .22s;
}
.card:hover { transform:translateY(-4px); box-shadow:var(--shadow-lg); border-color:var(--border-med); }
.card:hover::before { opacity:1; }

.cat-badge {
  display:inline-flex; align-items:center; gap:5px;
  font-family:'Cinzel',serif; font-size:.63rem;
  letter-spacing:.14em; text-transform:uppercase;
  color:var(--gold); margin-bottom:9px;
}
.cat-badge::before {
  content:''; width:14px; height:1px;
  background:var(--gold-pale); display:inline-block;
}

.card-title {
  font-family:'Cinzel',serif; font-size:1.05rem; font-weight:600;
  color:var(--ink); line-height:1.3; margin-bottom:5px;
}
.card-title a { color:inherit; text-decoration:none; transition:color .16s; }
.card-title a:hover { color:var(--gold); }
.link-badge {
  display:inline-block; font-size:.55rem; vertical-align:super;
  margin-left:4px; color:var(--gold); opacity:0;
  transition:opacity .16s; font-family:'EB Garamond',serif;
}
.card-title a:hover .link-badge { opacity:1; }

.card-author {
  font-size:.88rem; color:var(--ink-light);
  font-style:italic; line-height:1.4;
}

.card-divider {
  width:28px; height:1px;
  background:var(--gold-pale);
  margin:13px 0; flex-shrink:0;
}

.card-desc {
  font-size:.93rem; color:var(--ink-mid);
  line-height:1.72; flex:1;
}

.card-footer {
  margin-top:15px;
  display:flex; align-items:center; justify-content:space-between;
}
.cat-pill {
  font-size:.7rem; color:var(--ink-light);
  border:1px solid var(--border); padding:2px 9px; border-radius:1px;
  letter-spacing:.05em; background:rgba(140,109,31,.05);
}
.usul-link {
  font-size:.75rem; color:var(--gold);
  text-decoration:none; letter-spacing:.04em;
  font-family:'Cinzel',serif;
  border-bottom:1px solid transparent;
  transition:border-color .15s;
}
.usul-link:hover { border-color:var(--gold); }

.empty {
  grid-column:1/-1; text-align:center;
  padding:100px 24px; color:var(--ink-light);
  font-style:italic; font-size:1.15rem;
}

@keyframes fadeUp {
  from{opacity:0;transform:translateY(12px)}
  to{opacity:1;transform:translateY(0)}
}

// Preferred display order
const CAT_ORDER = [
  "Sarf","Nahiv","Belagat","Mantık",
  "Fıkıh","Fıkıh Usulü","Ferâiz",
  "Kelâm / Akâid","Hadis","Hadis Usulü",
  "Tefsir","Tefsir Usulü","Kıraat / Tecvid",
  "Tasavvuf","Hikmet","Hey'et","Hesap","Tıp"
];

const CAT_LABELS = {
  "Sarf":            "Sarf — Morfoloji",
  "Nahiv":           "Nahiv — Sözdizimi",
  "Belagat":         "Belagat — Retorik",
  "Mantık":          "Mantık",
  "Fıkıh":           "Fıkıh — İslam Hukuku",
  "Fıkıh Usulü":     "Fıkıh Usulü",
  "Ferâiz":          "Ferâiz — Miras",
  "Kelâm / Akâid":   "Kelâm / Akâid",
  "Hadis":           "Hadis",
  "Hadis Usulü":     "Hadis Usulü",
  "Tefsir":          "Tefsir",
  "Tefsir Usulü":    "Tefsir Usulü",
  "Kıraat / Tecvid": "Kıraat & Tecvid",
  "Tasavvuf":        "Tasavvuf",
  "Hikmet":          "Hikmet — Felsefe",
  "Hey'et":          "Hey'et — Astronomi",
  "Hesap":           "Hesap & Hendese",
  "Tıp":             "Tıp",
};

const cats = CAT_ORDER.filter(c => BOOKS.some(b => b.cat === c));

// Build filter buttons
const filtersEl = document.getElementById('filters');
cats.forEach(c => {
  const btn = document.createElement('button');
  btn.className = 'tag-btn';
  btn.dataset.f = c;
  btn.textContent = c;
  filtersEl.appendChild(btn);
});

document.getElementById('hdr-meta').textContent =
  `${BOOKS.length} Eser  ·  ${cats.length} İlim Dalı`;

let activeCat = 'all';
let query = '';

function render() {
  const q = query.toLowerCase();
  const filtered = BOOKS.filter(b => {
    const mc = activeCat === 'all' || b.cat === activeCat;
    const mq = !q ||
      b.name.toLowerCase().includes(q)   ||
      b.author.toLowerCase().includes(q) ||
      b.desc.toLowerCase().includes(q)   ||
      b.cat.toLowerCase().includes(q);
    return mc && mq;
  });

  document.getElementById('info').textContent =
    `${filtered.length} / ${BOOKS.length} eser gösteriliyor`;

  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  if (!filtered.length) {
    grid.innerHTML = '<div class="empty">Aramanızla eşleşen eser bulunamadı.</div>';
    return;
  }

  filtered.forEach((b, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.cat = b.cat;
    card.style.animationDelay = `${Math.min(i * 0.03, 0.5)}s`;

    const titleInner = b.url
      ? `<a href="${b.url}" target="_blank" rel="noopener">${b.name}<span class="link-badge">↗</span></a>`
      : b.name;

    card.innerHTML = `
      <div class="cat-badge">${CAT_LABELS[b.cat] || b.cat}</div>
      <div class="card-title">${titleInner}</div>
      <div class="card-author">${b.author}</div>
      <div class="card-divider"></div>
      <div class="card-desc">${b.desc}</div>
      <div class="card-footer">
        <span class="cat-pill">${b.cat}</span>
        ${b.url ? `<a class="usul-link" href="${b.url}" target="_blank" rel="noopener">${b.url.includes('archive.org') ? 'archive.org ↗' : 'usul.ai ↗'}</a>` : ''}
      </div>
    `;
    grid.appendChild(card);
  });
}

filtersEl.addEventListener('click', e => {
  const btn = e.target.closest('.tag-btn');
  if (!btn) return;
  document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeCat = btn.dataset.f;
  render();
});

document.getElementById('search').addEventListener('input', e => {
  query = e.target.value;
  render();
});

render();
</script>
</article>
