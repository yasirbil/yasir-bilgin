function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function hl(text, q) {
  if (!q) return esc(text);
  const rx = new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
  return esc(text).replace(rx,'<mark>$1</mark>');
}

/* ---- Sidebar renderers ---- */
function makePills(arr, cntMap, isActiveVal, fnName, filterQ) {
  const q = (filterQ||'').toLowerCase();
  const filtered = q ? arr.map((v,i)=>{return{v,i}}).filter(o=>o.v.toLowerCase().includes(q)) : arr.map((v,i)=>{return{v,i}});
  if (!filtered.length) return '<div class="no-results-pill">No matches</div>';
  return filtered.map(o => {
    const active = typeof isActiveVal === 'function' ? isActiveVal(o.v) : isActiveVal === o.v;
    return `<div class="pill ${active?'active':''}" onclick="${fnName}(${o.i})">
      <span class="pill-text" title="${esc(o.v)}">${esc(o.v)}</span>
      <span class="pill-count">${cntMap[o.v]||0}</span>
    </div>`;
  }).join('');
}

/* ---- Active filter bar ---- */
function renderActiveBar() {
  const chips = [];
  if (state.search)     chips.push({ label:`"${state.search}"`, type:'Search',    clear:clearSearch });
  if (state.category)   chips.push({ label:state.category,        type:'Category',  clear:()=>{state.category=null;state.page=1;render();} });
  state.years.forEach(y=> chips.push({ label:String(y),           type:'Year',      clear:()=>{state.years.delete(y);state.page=1;render();} }));
  if (state.conference) chips.push({ label:state.conference,      type:'Conference',clear:()=>{state.conference=null;state.page=1;render();} });
  if (state.author)     chips.push({ label:state.author,          type:'Author',    clear:()=>{state.author=null;state.page=1;render();} });
  if (state.location)   chips.push({ label:state.location,        type:'Location',  clear:()=>{state.location=null;state.page=1;render();} });
  state.tags.forEach(t=> chips.push({ label:t,                    type:'Tag',       clear:()=>{state.tags.delete(t);state.page=1;render();} }));

  const bar = document.getElementById('activeBar');
  const chipsEl = document.getElementById('activeChips');
  if (chips.length) {
    bar.classList.add('visible');
    window._chipClearFns = chips.map(c=>c.clear);
    chipsEl.innerHTML = chips.map((c,i) =>
      `<span class="active-chip" onclick="window._chipClearFns[${i}]()">
        <span class="chip-type">${esc(c.type)}</span>&nbsp;${esc(c.label.length>32?c.label.slice(0,30)+'…':c.label)}&nbsp;✕
      </span>`
    ).join('');
  } else {
    bar.classList.remove('visible');
    chipsEl.innerHTML='';
  }
}

  if (state.category)   data = data.filter(r=>r.category===state.category);
  if (state.years.size) data = data.filter(r=>state.years.has(r.year));
  if (state.conference) data = data.filter(r=>r.conference===state.conference);
  if (state.author)     data = data.filter(r=>r.author===state.author);
  if (state.location)   data = data.filter(r=>r.location===state.location);
  if (state.tags.size)  data = data.filter(r=>[...state.tags].every(t=>r.tags.includes(t)));
  const s = state.sort;
  if (s==='year-desc')  data=[...data].sort((a,b)=>(b.year||0)-(a.year||0));
  else if(s==='year-asc')  data=[...data].sort((a,b)=>(a.year||0)-(b.year||0));
  else if(s==='title-asc') data=[...data].sort((a,b)=>a.title.localeCompare(b.title));
  else if(s==='author-asc')data=[...data].sort((a,b)=>a.author.localeCompare(b.author));
  return data;
}

/* ---- Cards ---- */
function render() {
  renderSidebar();
  renderActiveBar();
  const filtered = getFiltered();
  const total = filtered.length;
  const totalPages = Math.max(1, Math.ceil(total/PAGE_SIZE));
  if (state.page > totalPages) state.page = totalPages;
  const slice = filtered.slice((state.page-1)*PAGE_SIZE, state.page*PAGE_SIZE);

  document.getElementById('resultsCount').innerHTML = `Showing <strong>${total.toLocaleString()}</strong> of ${RAW_DATA.length.toLocaleString()} papers`;
  document.getElementById('totalBadge').textContent = total;

  const q = state.search.trim().toLowerCase();
  const cardsEl = document.getElementById('cards');

  if (!slice.length) {
    cardsEl.innerHTML = `<div class="empty"><div class="empty-icon">📚</div><h2>No papers found</h2><p>Try adjusting your search or filters.</p></div>`;
  } else {
    cardsEl.innerHTML = slice.map((r,i) => {
      // Use index-safe data attributes for card-level click handlers
      const catIdx  = ALL_CATS.indexOf(r.category);
      const yearVal = r.year;
      const confIdx = ALL_CONFS.indexOf(r.conference);
      const authIdx = ALL_AUTHS.indexOf(r.author);
      const locIdx  = ALL_LOCS.indexOf(r.location);

      const tags = r.tags.map(t => {
        const ti = ALL_TAGS.indexOf(t);
        return `<span class="tag-chip ${state.tags.has(t)?'active':''}" onclick="toggleTag(${ti})">${esc(t)}</span>`;
      }).join('');

      const titleInner = r.url
        ? `<a href="${esc(r.url)}" target="_blank" rel="noopener">${hl(r.title,q)}</a>`
        : hl(r.title,q);

      const confParts = [];
      if (r.conference) confParts.push(`<span class="conf-name" onclick="toggleConf(${confIdx})" title="Filter by conference">${hl(r.conference,q)}</span>`);
      if (r.location)   confParts.push(`<span class="conf-loc"  onclick="toggleLoc(${locIdx})"   title="Filter by location">${esc(r.location)}</span>`);
      if (r.year)       confParts.push(`<span class="card-year ${state.years.has(r.year)?'active':''}" onclick="toggleYear(${ALL_YEARS.indexOf(r.year)})" title="Filter by year">${r.year}</span>`);
      const confHtml = confParts.length ? `<div class="card-conference">${confParts.join('<span style="color:var(--border);padding:0 3px">·</span>')}</div>` : '';

      return `<div class="card" style="animation-delay:${Math.min(i,10)*0.025}s">
        <div class="card-title">${titleInner}</div>
        ${r.author ? `<span class="card-author" onclick="toggleAuth(${authIdx})" title="Filter by author">${hl(r.author,q)}</span>` : ''}
        ${confHtml}
        ${tags ? `<div class="card-tags">${tags}</div>` : ''}
      </div>`;
    }).join('');
  }
  renderPagination(totalPages);
}

function renderPagination(totalPages) {
  const el = document.getElementById('pagination');
  if (totalPages<=1) { el.innerHTML=''; return; }
  let btns = `<button class="page-btn" onclick="goPage(${state.page-1})" ${state.page===1?'disabled':''}>‹</button>`;
  const range=[];
  for(let p=1;p<=totalPages;p++) {
    if(p===1||p===totalPages||Math.abs(p-state.page)<=2) range.push(p);
    else if(range[range.length-1]!=='…') range.push('…');
  }
  range.forEach(p=>{
    if(p==='…') btns+=`<span class="page-btn" style="cursor:default;border:none;background:none">…</span>`;
    else btns+=`<button class="page-btn ${p===state.page?'active':''}" onclick="goPage(${p})">${p}</button>`;
  });
  btns+=`<button class="page-btn" onclick="goPage(${state.page+1})" ${state.page===totalPages?'disabled':''}>›</button>`;
  el.innerHTML=btns;
}

function goPage(p)  { state.page=p; render(); window.scrollTo({top:0,behavior:'smooth'}); }
function onSort()   { state.sort=document.getElementById('sortSelect').value; state.page=1; render(); }
function clearSearch() { state.search=''; document.getElementById('searchInput').value=''; document.getElementById('searchClear').classList.remove('visible'); state.page=1; render(); }
function clearAll() {
  state={search:'',category:null,years:new Set(),conference:null,author:null,location:null,tags:new Set(),sort:'default',page:1};
  document.getElementById('searchInput').value='';
  document.getElementById('searchClear').classList.remove('visible');
  document.getElementById('sortSelect').value='default';
  ['confSearch','authorSearch','tagSearch'].forEach(id=>{ const el=document.getElementById(id); if(el) el.value=''; });
  render();
}

document.getElementById('searchInput').addEventListener('input', e=>{
  state.search=e.target.value; state.page=1;
  document.getElementById('searchClear').classList.toggle('visible', !!e.target.value);
  render();
});

render();
</script>
